<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#3B6B4A">
<link rel="manifest" href="./manifest.webmanifest">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="農務小幫手">
<title>農務小幫手</title>
<style>
:root{
  --paper:#F4F2EB;--ink:#222820;--ink-soft:#5C6353;--line:#DCE0D2;--card:#FFFFFF;--card2:#FAF9F4;
  --accent:#1F9E4C;--accent-d:#17803C;--accent-soft:#DCF0E0;
  --harv:#4E8C5A;--harv-bg:#E4EFE2;--grow:#B9832A;--grow-bg:#F4E9D2;--pre:#78806F;--pre-bg:#EAECE3;
  --warn:#B5533C;--warn-bg:#F4E1DA;--done:#9AA391;--blue:#3E6B84;
}
@media (prefers-color-scheme:dark){:root{
  --paper:#14170F;--ink:#E9EBE1;--ink-soft:#9FA595;--line:#2C3226;--card:#1D2218;--card2:#191E14;
  --accent:#3FCB74;--accent-d:#2FA85C;--accent-soft:#17301F;
  --harv:#77BE86;--harv-bg:#212F1D;--grow:#D6A94E;--grow-bg:#2D2713;--pre:#868E7C;--pre-bg:#22271C;
  --warn:#D9846B;--warn-bg:#2E1D16;--done:#5B6350;--blue:#77A6BE;
}}
:root[data-theme="light"]{--paper:#F4F2EB;--ink:#222820;--ink-soft:#5C6353;--line:#DCE0D2;--card:#FFFFFF;--card2:#FAF9F4;--accent:#1F9E4C;--accent-d:#17803C;--accent-soft:#DCF0E0;--harv:#4E8C5A;--harv-bg:#E4EFE2;--grow:#B9832A;--grow-bg:#F4E9D2;--pre:#78806F;--pre-bg:#EAECE3;--warn:#B5533C;--warn-bg:#F4E1DA;--done:#9AA391;--blue:#3E6B84;}
:root[data-theme="dark"]{--paper:#14170F;--ink:#E9EBE1;--ink-soft:#9FA595;--line:#2C3226;--card:#1D2218;--card2:#191E14;--accent:#3FCB74;--accent-d:#2FA85C;--accent-soft:#17301F;--harv:#77BE86;--harv-bg:#212F1D;--grow:#D6A94E;--grow-bg:#2D2713;--pre:#868E7C;--pre-bg:#22271C;--warn:#D9846B;--warn-bg:#2E1D16;--done:#5B6350;--blue:#77A6BE;}
*{box-sizing:border-box;}
body{margin:0;background:var(--paper);color:var(--ink);font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;line-height:1.55;-webkit-font-smoothing:antialiased;}
:root{--disp:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;}
.app{max-width:600px;margin:0 auto;padding:14px 14px 92px;}
header{display:flex;justify-content:space-between;align-items:flex-end;gap:10px;background:var(--accent);color:#fff;border-radius:20px;padding:16px 18px 17px;margin-bottom:18px;box-shadow:0 4px 16px rgba(0,0,0,.12);}
.eyebrow{display:inline-flex;align-items:center;gap:6px;font-size:.64rem;letter-spacing:.16em;text-transform:uppercase;color:#fff;background:rgba(255,255,255,.22);font-weight:800;padding:4px 11px;border-radius:20px;}
.eyebrow::before{content:"";width:7px;height:7px;border-radius:50%;background:#fff;flex:none;}
h1{font-family:var(--disp);font-size:2.15rem;letter-spacing:-.01em;font-weight:800;line-height:1.05;color:#fff;margin:.2em 0 0;}
.hd-date{font-size:.78rem;color:rgba(255,255,255,.9);text-align:right;font-weight:600;flex:none;}
h2{font-family:var(--disp);font-size:1.4rem;font-weight:800;letter-spacing:-.01em;margin:4px 0 3px;display:flex;align-items:center;gap:9px;}
h2::before{content:"";width:5px;height:1.05em;border-radius:3px;background:var(--accent);flex:none;}
.note{font-size:.82rem;color:var(--ink-soft);margin:0 0 13px;}
.sec-h{display:flex;justify-content:space-between;align-items:baseline;margin:20px 0 8px;}
.sec-h h3{font-size:.98rem;margin:0;}
.sec-h span{font-size:.78rem;color:var(--ink-soft);}
/* KPI */
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 6px;text-align:center;box-shadow:0 1px 2px rgba(0,0,0,.04);}
.kpi b{display:block;font-family:var(--disp);font-size:2.3rem;font-weight:800;line-height:1;color:var(--accent);font-variant-numeric:tabular-nums;letter-spacing:-.02em;}
.kpi.warn b{color:var(--warn);}
.kpi small{font-size:.68rem;color:var(--ink-soft);display:block;margin-top:5px;}
/* card */
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px;margin-bottom:12px;box-shadow:0 1px 2px rgba(0,0,0,.04);}
.card.tap{cursor:pointer;transition:transform .08s;}
.card.tap:active{transform:scale(.99);}
.card-top{display:flex;justify-content:space-between;align-items:center;gap:8px;}
.card-top h3{font-size:1.06rem;margin:0;}
.crop{color:var(--accent);}
.stage{font-size:.68rem;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;}
.stage.harv{background:var(--harv-bg);color:var(--harv);}.stage.grow{background:var(--grow-bg);color:var(--grow);}
.stage.pre{background:var(--pre-bg);color:var(--pre);}
.sub{font-size:.78rem;color:var(--ink-soft);margin:4px 0 9px;}
.prog{height:9px;background:var(--line);border-radius:6px;overflow:hidden;position:relative;}
.prog i{display:block;height:100%;border-radius:6px;}
.prog i.g{background:linear-gradient(90deg,var(--accent),var(--harv));}
.prog i.h{background:var(--harv);}
.prog-l{display:flex;justify-content:space-between;font-size:.72rem;color:var(--ink-soft);margin-top:5px;font-variant-numeric:tabular-nums;}
.pill{display:inline-block;font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--warn-bg);color:var(--warn);margin-top:8px;}
.pill.ok{background:var(--harv-bg);color:var(--harv);}
/* task */
.task{display:flex;align-items:flex-start;gap:10px;padding:10px 3px;border-bottom:1px solid var(--line);cursor:pointer;}
.task:last-child{border-bottom:none;}
.task input{width:22px;height:22px;margin:0;flex-shrink:0;accent-color:var(--accent);}
.task span{font-size:.93rem;}
.task input:checked+span{color:var(--done);text-decoration:line-through;}
.soon{margin-top:9px;padding-top:8px;border-top:1px dashed var(--line);font-size:.82rem;color:var(--ink-soft);}
.info{font-size:.88rem;background:var(--accent-soft);border-radius:9px;padding:9px 11px;margin:6px 0;}
/* forms */
label.f{display:block;font-size:.78rem;color:var(--ink-soft);font-weight:600;margin:11px 0 4px;}
input.t,select.t,textarea.t{width:100%;padding:10px 11px;border:1px solid var(--line);border-radius:10px;background:var(--card2);color:var(--ink);font-size:.98rem;font-family:inherit;}
textarea.t{resize:vertical;min-height:52px;}
button{font-family:inherit;cursor:pointer;border:none;border-radius:12px;font-weight:600;}
.btn{background:var(--accent);color:#fff;padding:13px;width:100%;margin-top:14px;font-size:1rem;font-weight:700;letter-spacing:.03em;transition:transform .08s;}
.btn:active{transform:scale(.985);}
@media (prefers-color-scheme:dark){.btn{color:#12160f;}}
:root[data-theme="dark"] .btn{color:#12160f;}
.btn.sec{background:transparent;color:var(--accent);border:1.5px solid var(--accent);}
.del{background:transparent;color:var(--warn);font-size:.8rem;padding:4px 6px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
/* quick log */
.qlog{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:6px 0 4px;}
.qlog button{background:var(--card2);border:1px solid var(--line);color:var(--ink);padding:11px 4px;font-size:.82rem;display:flex;flex-direction:column;gap:4px;align-items:center;}
.qlog button .qi{font-size:1.3rem;}
/* records */
.rec{display:flex;gap:10px;padding:9px 2px;border-bottom:1px solid var(--line);font-size:.86rem;}
.rec:last-child{border-bottom:none;}
.rec .rd{color:var(--ink-soft);font-variant-numeric:tabular-nums;white-space:nowrap;font-size:.8rem;min-width:42px;}
.rec .rt{flex:1;}
.rtag{display:inline-block;font-size:.66rem;font-weight:700;padding:1px 7px;border-radius:20px;margin-right:6px;}
.rtag.fert{background:var(--grow-bg);color:var(--grow);}
.rtag.spray{background:var(--warn-bg);color:var(--warn);}
.rtag.harv{background:var(--harv-bg);color:var(--harv);}
.rtag.ecph{background:var(--accent-soft);color:var(--accent);}
.rtag.obs{background:var(--pre-bg);color:var(--pre);}
.rtag.work{background:#E3EAEE;color:var(--blue);}
.rtag.ipm{background:#EEE8F4;color:#6B44A0;}
@media (prefers-color-scheme:dark){.rtag.work{background:#1C2A31;}.rtag.ipm{background:#2A1D38;color:#A97FD6;}}
:root[data-theme="dark"] .rtag.work{background:#1C2A31;}:root[data-theme="dark"] .rtag.ipm{background:#2A1D38;color:#A97FD6;}
.res{background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:13px;margin-top:13px;}
.res h4{margin:0 0 7px;font-size:1.02rem;font-family:var(--disp);font-weight:800;}
.res .r{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--line);font-size:.9rem;}
.res .r:last-child{border-bottom:none;}
.res .r b{font-variant-numeric:tabular-nums;}
.empty{text-align:center;color:var(--ink-soft);padding:34px 12px;font-size:.9rem;}
.back{background:none;color:var(--accent);font-size:.9rem;padding:6px 0;margin-bottom:6px;font-weight:600;}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:.75rem;font-weight:700;font-variant-numeric:tabular-nums;}
.badge.hi{background:var(--harv-bg);color:var(--harv);}.badge.mid{background:var(--grow-bg);color:var(--grow);}.badge.lo{background:var(--warn-bg);color:var(--warn);}
.diag-q{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:12px 14px;margin-bottom:9px;cursor:pointer;font-size:.95rem;display:flex;justify-content:space-between;align-items:center;}
.diag-q:active{background:var(--card2);}
.diag-a{background:var(--warn-bg);border-radius:11px;padding:12px 14px;margin:-4px 0 9px;font-size:.9rem;}
.diag-a b{color:var(--warn);}
.chart{display:flex;align-items:flex-end;gap:4px;height:110px;padding:8px 0 18px;}
.chart .bar{flex:1;border-radius:5px 5px 0 0;min-height:3px;position:relative;}
.chart .bar span{position:absolute;bottom:-18px;left:0;right:0;text-align:center;font-size:.6rem;color:var(--ink-soft);}
.chart .bar b{position:absolute;top:-15px;left:0;right:0;text-align:center;font-size:.6rem;color:var(--ink-soft);font-variant-numeric:tabular-nums;}
.chart-ph{display:flex;gap:4px;margin-top:4px;border-top:1px solid var(--line);padding-top:4px;}
.chart-ph-lbl{flex:none;font-size:.6rem;color:var(--ink-soft);padding:2px 4px 0 0;white-space:nowrap;align-self:center;}
.chart-ph-v{flex:1;text-align:center;font-size:.65rem;padding:2px 0;border-radius:4px;font-variant-numeric:tabular-nums;}
.foot{font-size:.74rem;color:var(--ink-soft);text-align:center;margin-top:18px;line-height:1.7;}
nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--line);display:flex;max-width:600px;margin:0 auto;padding-bottom:env(safe-area-inset-bottom);}
nav button{flex:1;background:none;padding:9px 2px 11px;color:var(--ink-soft);font-size:.68rem;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:2px;}
nav button .ic{font-size:1.3rem;line-height:1;}
nav button.on{color:var(--accent);}
.hidden{display:none;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;justify-content:center;z-index:20;}
.modal{background:var(--card);border-radius:18px 18px 0 0;width:100%;max-width:600px;padding:18px 16px calc(20px + env(safe-area-inset-bottom));max-height:88vh;overflow-y:auto;}
.modal h3{margin:0 0 2px;font-size:1.15rem;}
/* ---------- 桌面版（寬螢幕）：左側選單 + 寬版面 + 置中彈窗 ---------- */
@media (min-width:900px){
  .app{max-width:960px;margin:0 auto 0 250px;padding:22px 30px 40px;}
  header{padding-top:8px;}
  h1{font-size:1.8rem;}
  nav{position:fixed;top:0;left:0;bottom:0;right:auto;width:220px;max-width:none;margin:0;
      flex-direction:column;align-items:stretch;border-top:none;border-right:1px solid var(--line);
      padding:22px 12px;gap:4px;background:var(--card);}
  nav::before{content:"農務小幫手";display:block;font-family:var(--disp);font-weight:800;font-size:1.2rem;
      font-weight:700;color:var(--accent);padding:0 12px 14px;margin-bottom:6px;border-bottom:1px solid var(--line);}
  nav button{flex:none;flex-direction:row;justify-content:flex-start;gap:12px;padding:12px 14px;
      font-size:.95rem;border-radius:11px;text-align:left;}
  nav button .ic{font-size:1.25rem;}
  nav button.on{background:var(--accent-soft);}
  .kpis{gap:10px;}
  .kpi b{font-size:2rem;}
  /* 彈窗置中、卡片式 */
  .modal-bg{align-items:center;}
  .modal{border-radius:18px;max-width:520px;max-height:86vh;padding:22px 22px;}
  /* 診斷、工具在寬螢幕不必貼滿，維持易讀寬度 */
}
@media (min-width:1400px){
  .app{margin-left:auto;padding-left:30px;}
  nav{left:max(0px,calc(50% - 700px));}
}
/* 天氣預報小工具 */
.wx-card{background:linear-gradient(135deg,var(--accent-d) 0%,var(--accent) 100%);color:#fff;border-radius:18px;padding:13px 15px 10px;margin-bottom:14px;box-shadow:0 3px 14px rgba(0,0,0,.10);}
.wx-title{font-size:.72rem;font-weight:700;letter-spacing:.06em;opacity:.88;margin-bottom:8px;}
.wx-days{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;}
.wx-day{text-align:center;padding:6px 2px;}
.wx-label{font-size:.62rem;font-weight:700;opacity:.75;}
.wx-icon{font-size:1.4rem;line-height:1.2;margin:2px 0;}
.wx-txt{font-size:.58rem;opacity:.78;margin-bottom:1px;}
.wx-temp{font-size:.82rem;font-weight:700;}
.wx-lo{font-weight:400;opacity:.78;}
.wx-rain{font-size:.65rem;margin-top:2px;}
.wx-foot{font-size:.58rem;opacity:.55;text-align:right;margin-top:7px;}
/* 今日農事決策 */
.dec-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:12px;}
.dec-hd{font-size:.8rem;font-weight:700;color:var(--ink-soft);margin-bottom:8px;display:flex;justify-content:space-between;align-items:baseline;}
.dec-src{font-size:.63rem;font-weight:400;color:var(--done);}
.dec-row{display:flex;align-items:baseline;gap:8px;padding:6px 0;border-bottom:1px solid var(--line);font-size:.82rem;line-height:1.4;}
.dec-row:last-child{border-bottom:none;}
.dec-cat{flex:none;font-weight:800;font-size:.72rem;width:4.5em;}
.dec-cat.hi{color:var(--warn);}.dec-cat.mid{color:var(--grow);}.dec-cat.ok{color:var(--harv);}
.dec-dot{flex:none;font-size:.55rem;margin-top:.1em;}
.dec-dot.hi{color:var(--warn);}.dec-dot.mid{color:var(--grow);}.dec-dot.ok{color:var(--harv);}
.dec-msg{flex:1;color:var(--ink-soft);}
/* 天氣驅動病害風險 */
.risk-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:12px;}
.risk-hd{display:flex;align-items:center;gap:7px;font-size:.82rem;font-weight:700;margin-bottom:6px;color:var(--ink-soft);}
.risk-row{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid var(--line);}
.risk-row:last-child{border-bottom:none;}
.risk-level{font-size:.63rem;font-weight:800;padding:2px 7px;border-radius:20px;white-space:nowrap;flex:none;margin-top:2px;}
.risk-level.hi{background:var(--warn-bg);color:var(--warn);}.risk-level.mid{background:var(--grow-bg);color:var(--grow);}
.risk-info{flex:1;min-width:0;}
.risk-name{font-size:.88rem;font-weight:700;}
.risk-sym{font-size:.7rem;color:var(--ink-soft);margin-top:1px;}
.risk-adv{font-size:.7rem;color:var(--blue);margin-top:2px;}
.risk-score{font-size:.67rem;color:var(--ink-soft);flex:none;font-variant-numeric:tabular-nums;padding-top:3px;}
/* 今日智慧行動清單 */
.daily-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:12px;}
.daily-hd{font-size:.8rem;font-weight:700;color:var(--ink-soft);margin-bottom:8px;display:flex;justify-content:space-between;align-items:baseline;}
.daily-row{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);font-size:.82rem;line-height:1.45;}
.daily-row:last-child{border-bottom:none;}
.daily-icon{flex:none;font-size:1.1rem;line-height:1;padding-top:.1em;}
.daily-body{flex:1;min-width:0;}
.daily-plot{font-size:.65rem;font-weight:700;color:var(--ink-soft);margin-bottom:2px;letter-spacing:.04em;text-transform:uppercase;}
.daily-task{font-size:.85rem;font-weight:700;line-height:1.3;}
.daily-task.urgent{color:var(--warn);}
.daily-detail{font-size:.7rem;color:var(--ink-soft);margin-top:3px;line-height:1.5;}
.daily-badge{font-size:.6rem;font-weight:800;padding:2px 7px;border-radius:20px;white-space:nowrap;flex:none;margin-top:3px;}
.daily-badge.urgent{background:var(--warn-bg);color:var(--warn);}
.daily-badge.today{background:var(--accent-soft);color:var(--accent);}
</style>

</head>
<body>
<div class="app">
  <header>
    <div><div class="eyebrow">農務小幫手 · 信義鄉溫室</div><h1 id="title">經營總覽</h1></div>
    <div class="hd-date" id="hd-date"></div>
  </header>
  <main id="view-dash"></main>
  <main id="view-plots" class="hidden"></main>
  <main id="view-contract" class="hidden"></main>
  <main id="view-diag" class="hidden"></main>
  <main id="view-tools" class="hidden"></main>
  <nav>
    <button data-v="dash" class="on"><span class="ic">📊</span>總覽</button>
    <button data-v="plots"><span class="ic">🌱</span>田區</button>
    <button data-v="contract"><span class="ic">🤝</span>契作</button>
    <button data-v="diag"><span class="ic">🔍</span>診斷</button>
    <button data-v="tools"><span class="ic">🧮</span>工具</button>
  </nav>
</div>
<div id="modal-root"></div>

<script>
const CROPS={
 "牛番茄":{科:"茄科",grow:60,dur:120,density:20000,fert:{堆肥:10000,N:250,P2O5:200,K2O:180},ec:{"苗期":2.0,"生長期":2.5,"花期":2.8,"果期":3.0},idx:[.85,.85,.9,.95,1,1.2,1.3,1.35,1.25,1.05,.9,.85],sched:[[0,"定植、澆定根水"],[3,"巡查活著率、補植死苗"],[8,"立支架/牽繩固定"],[14,"開始摘側芽（單幹整枝）"],[21,"第一次追肥"],[35,"開花，輔助授粉"],[45,"疏果、摘老葉"],[60,"開始分批採收"]]},

function loadFirebase(){return new Promise((res,rej)=>{
  if(window.firebase&&window.firebase.firestore){res();return;}
  const base="https://www.gstatic.com/firebasejs/10.12.2/";
  const s1=document.createElement("script");s1.src=base+"firebase-app-compat.js";
  s1.onload=()=>{const s2=document.createElement("script");s2.src=base+"firebase-firestore-compat.js";
    s2.onload=()=>res();s2.onerror=()=>rej(new Error("載入 Firestore SDK 失敗"));document.head.appendChild(s2);};
  s1.onerror=()=>rej(new Error("載入 Firebase SDK 失敗（需連線）"));document.head.appendChild(s1);
});}
async function fbDb(){const s=loadSync();if(!s.config||!s.code)throw new Error("尚未設定雲端同步");

/* 動態規則引擎：依回報產生警示/新增任務/處置建議 */
function evalCheckin(rec,inp){
  const c=CROPS[rec.crop];const age=Math.round((today()-parseD(rec.date))/DAY);
  const[stg,target]=ecStage(c,age);const out=[];
  if(inp.ec){const ec=+inp.ec;
    if(ec>Math.max(3.5,target*1.3))out.push({lv:"warn",t:"⚠ EC "+ec+" 偏高（目標約"+target+"）→ 今日淋洗鹽分：澆清水沖排、暫停追肥"});
    else if(ec<target*0.6)out.push({lv:"info",t:"EC "+ec+" 偏低（目標約"+target+"）→ 可適度追肥補養分"});
    else out.push({lv:"ok",t:"EC "+ec+" 在合理範圍（目標約"+target+"）"});}
  if(inp.ph){const ph=+inp.ph;
    if(ph<5.5)out.push({lv:"warn",t:"⚠ pH "+ph+" 偏酸 → 施用石灰資材調整，過酸不利益菌與吸收"});
    else if(ph>7.2)out.push({lv:"warn",t:"⚠ pH "+ph+" 偏鹼 → 酸化調整，注意微量元素固定"});}
  if(inp.pest&&inp.pest!=="無"){
    out.push({lv:"warn",t:"🪤 發現「"+inp.pest+"」→ 加掛黃色黏板監測密度；達門檻才查植保系統合法用藥並鎖安全採收期"});
    if(inp.pest.indexOf("病")>=0||inp.pest.indexOf("毒")>=0)out.push({lv:"warn",t:"疑似病害 → 立即拔除病株移出園外、避免擴散；工具消毒"});}
  if(inp.weather&&inp.weather!=="正常"){
    const w=inp.weather;
    if(w.indexOf("低溫")>=0||w.indexOf("寒")>=0)out.push({lv:"warn",t:"🌡️ "+w+" → 夜間保溫（覆蓋/加溫），花果期低於15℃易落花落果"});
    if(w.indexOf("豪雨")>=0||w.indexOf("颱")>=0)out.push({lv:"warn",t:"🌧️ "+w+" → 加強排水、暫緩採收、穩定介質水分防裂果、綁固支架"});
    if(w.indexOf("高溫")>=0||w.indexOf("乾")>=0)out.push({lv:"info",t:"☀️ "+w+" → 遮陰降溫、增加灌溉但保持穩定，注意薊馬/蟎"});}
  if(inp.symptom&&inp.symptom!=="無"){
    const d=DIAG.find(x=>x.q===inp.symptom);
    if(d)out.push({lv:"warn",t:"🔍 "+inp.symptom+"：可能"+d.c+" → "+d.a});}
  return out;
}

function tasksFor(rec){
  const c=CROPS[rec.crop];const plant=parseD(rec.date);const age=Math.round((today()-plant)/DAY);
  const out={age,today:[],soon:[]};if(age<0){out.pre=(-age);return out;}
  if(age>c.grow+c.dur+30){out.done=1;return out;}
  c.sched.forEach(([d,t])=>{const df=d-age;if(df===0)out.today.push("📋 "+t);else if(df>0&&df<=7)out.soon.push(md(addD(plant,d))+"（"+df+"天）"+t);});
  const[stg,ecv]=ecStage(c,age);
  out.today.push("🌡️ 抄錄 EC/pH（"+stg+"，目標約"+ecv+"）");
  out.today.push("👀 巡視植株異常（黃化/捲葉/落花/裂果）");
  if(age%7===0)out.today.push("🪤 黏板巡查病蟲害");
  if(age>=c.grow){out.today.push("🧺 採收期第"+(age-c.grow)+"天：分批採收、記錄產量");}
  else if(c.grow-age<=7&&c.grow-age>0)out.soon.push(md(addD(plant,c.grow))+"（"+(c.grow-age)+"天）預計開始採收");
  return out;
}

/* ---------- 天氣預報（Open-Meteo，免金鑰，支援瀏覽器直連） ---------- */
const WX_LAT=23.40,WX_LON=120.85; // 信義鄉中心座標
const WMO_EMOJI={0:'☀️',1:'🌤',2:'⛅',3:'☁️',45:'🌫',48:'🌫',51:'🌦',53:'🌦',55:'🌧',61:'🌦',63:'🌧',65:'🌧',80:'🌦',81:'🌧',82:'⛈',95:'⛈',96:'⛈',99:'⛈',71:'❄️',73:'❄️',75:'❄️',77:'❄️'};
const WMO_TXT={0:'晴',1:'多雲',2:'局部多雲',3:'陰',45:'霧',48:'霧',51:'毛毛雨',53:'小雨',55:'中雨',61:'小雨',63:'中雨',65:'大雨',80:'陣雨',81:'雷陣雨',82:'暴雨',95:'雷雨',96:'雷雨',99:'大雷雨',71:'小雪',73:'中雪',75:'大雪',77:'冰晶'};
let _wxCache=null,_wxAt=0;
async function fetchWeather(){
  if(_wxCache&&Date.now()-_wxAt<1800000)return _wxCache;
  const url='https://api.open-meteo.com/v1/forecast?latitude='+WX_LAT+'&longitude='+WX_LON+
    '&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,weathercode,precipitation_sum,sunshine_duration'+
    '&timezone=Asia%2FTaipei&forecast_days=5';
  const r=await fetch(url);if(!r.ok)throw new Error(r.status);
  const d=await r.json();_wxCache=d;_wxAt=Date.now();return d;
}
function wxAlerts(wx){
  const hints=[];const d=wx.daily||{};
  const rain1=d.precipitation_probability_max?d.precipitation_probability_max[1]:0;
  const rain2=d.precipitation_probability_max?d.precipitation_probability_max[2]:0;
  const tmin0=d.temperature_2m_min?d.temperature_2m_min[0]:20;
  const tmin1=d.temperature_2m_min?d.temperature_2m_min[1]:20;
  const tmax0=d.temperature_2m_max?d.temperature_2m_max[0]:25;
  if(rain1>=60)hints.push('☔ 明日降雨機率 '+rain1+'%：<b>今日宜完成施藥 / 施肥</b>，避免雨水稀釋與農藥飄移');
  if(rain1>=60&&rain2>=60)hints.push('🌧 明後兩日持續降雨：溫室加強通風防灰黴，排水清通，適度減少灌溉');
  if(tmin0<12)hints.push('🌡 今夜低溫 '+tmin0+'°C：<b>夜間保溫</b>（低於 15°C 易落花落果），必要時加溫 / 覆蓋');
  else if(tmin1<12)hints.push('🌡 明夜預測低溫 '+tmin1+'°C：提前準備保溫設施');
  if(tmax0>=32)hints.push('☀️ 今日高溫 '+tmax0+'°C：遮陰降溫、增加灌溉，注意薊馬 / 蟎密度');
  return hints;
}
function renderWeatherWidget(wx){
  const d=wx.daily;if(!d||!d.time)return'';
  const labels=['今','明','後','大後','5日'];
  const cells=d.time.slice(0,5).map((dt,i)=>{
    const code=d.weathercode?d.weathercode[i]:0;
    const hi=d.temperature_2m_max?Math.round(d.temperature_2m_max[i]):'?';
    const lo=d.temperature_2m_min?Math.round(d.temperature_2m_min[i]):'?';
    const rain=d.precipitation_probability_max?d.precipitation_probability_max[i]:0;
    const bg=rain>=60?'rgba(255,255,255,.18)':rain>=30?'rgba(255,255,255,.1)':'rgba(255,255,255,.06)';
    return '<div class="wx-day" style="background:'+bg+';border-radius:10px">'+
      '<div class="wx-label">'+labels[i]+'</div>'+
      '<div class="wx-icon">'+(WMO_EMOJI[code]||'🌡')+'</div>'+
      '<div class="wx-txt">'+(WMO_TXT[code]||'')+'</div>'+
      '<div class="wx-temp"><b>'+hi+'</b>/<span class="wx-lo">'+lo+'</span></div>'+
      '<div class="wx-rain">💧'+rain+'%</div>'+
      '</div>';}).join('');
  return '<div class="wx-card"><div class="wx-title">📍 信義鄉高冷地 · 5日天氣預報</div>'+
    '<div class="wx-days">'+cells+'</div>'+
    '<div class="wx-foot">Open-Meteo · 23.4°N 120.85°E · 僅供農事參考</div></div>';
}
function loadWx(container){
  (async()=>{
    try{
      const wx=await fetchWeather();
      const el=container.querySelector('#wx-widget');if(el)el.innerHTML=renderWeatherWidget(wx);
      const hints=wxAlerts(wx);
      if(hints.length){
        const ha=container.querySelector('#wx-alerts');
        if(ha){ha.innerHTML=hints.map(h=>'<div class="info" style="margin-bottom:6px;background:var(--warn-bg);color:var(--warn)">'+h+'</div>').join('');ha.style.display='';}
      }
    }catch(e){/* 離線或受限網路時靜默忽略 */}
    // 每日智慧行動清單 — 呼叫 daily Function（天氣×病害×田區狀態統一整合）
    try{
      const dr=container.querySelector('#disease-risk');if(!dr)return;
      const plots=load();
      // 計算每個田區的狀態摘要，傳給後端做精準評分
      function daysSinceType(rec,type){
        const rs=(rec.records||[]).filter(r=>r.type===type);
        if(!rs.length)return null;
        const last=rs.map(r=>parseD(r.date)).reduce((a,b)=>a>b?a:b);
        return Math.round((today()-last)/DAY);
      }
      const plotSummaries=plots.map(rec=>{
        const c=CROPS[rec.crop];const[,,ageDays]=stageOf(rec);
        const isHarvesting=ageDays>=0&&ageDays>=c.grow;
        const phi=phiLock(rec);
        let stageLabel='';
        if(ageDays<0)stageLabel='定植期';
        else if(isHarvesting)stageLabel='採收期';
        else{const[sn]=ecStage(c,ageDays);stageLabel=sn||'';}
        const isDone=ageDays>c.grow+c.dur+30;
        return{
          plot:rec.plot,crop:rec.crop,stage:stageLabel,ageDays,isHarvesting,isDone,
          daysToHarvest:c.grow-ageDays,
          inPHI:!!phi,phiEndStr:phi?md(phi):null,
          ecLastDays:daysSinceType(rec,'ecph'),
          ipmLastDays:daysSinceType(rec,'ipm'),
          sprayLastDays:daysSinceType(rec,'spray'),
        };
      });
      const resp=await fetch('/.netlify/functions/daily',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({plots:plotSummaries})
      });
      if(resp.ok){
        const data=await resp.json();
        dr.innerHTML=renderDecisions(data.decisions,data.weather)+
          renderDailyTasks(data.tasks)+
          renderDiseaseRisk(data.risks,data.weather);
      }
    }catch(e){/* 離線 / 本機開發時靜默忽略 */}
  })();
}
function renderDecisions(decs,wx){
  if(!decs||!decs.length)return'';
  const src=wx?.source==='CWA'
    ?'<span class="dec-src">📡 '+wx.stations+'</span>'
    :'<span class="dec-src">🌐 Open-Meteo 預報</span>';
  const rows=decs.map(d=>{
    const icons={ok:'●',mid:'●',hi:'●'};
    return '<div class="dec-row">'+
      '<span class="dec-dot '+d.level+'">'+icons[d.level]+'</span>'+
      '<span class="dec-cat '+d.level+'">'+d.cat+'</span>'+
      '<span class="dec-msg">'+d.msg+'</span></div>';
  }).join('');
  return '<div class="dec-card"><div class="dec-hd">📋 今日農事決策'+src+'</div>'+rows+'</div>';
}
function renderDailyTasks(tasks){
  if(!tasks||!tasks.length)return'';
  const urgent=tasks.filter(t=>t.priority==='urgent').length;
  const hd=urgent
    ?'🎯 今日行動清單<span style="font-size:.65rem;color:var(--warn);font-weight:700">⚠ '+urgent+' 項緊急</span>'
    :'🎯 今日行動清單';
  const rows=tasks.map(t=>{
    const badge=t.priority==='urgent'
      ?'<span class="daily-badge urgent">緊急</span>'
      :'<span class="daily-badge today">今日</span>';
    const detail=t.detail
      ?'<div class="daily-detail">'+t.detail.replace(/\n/g,'<br>')+'</div>'
      :'';
    return'<div class="daily-row">'+
      '<div class="daily-icon">'+t.icon+'</div>'+
      '<div class="daily-body">'+
        (t.plot?'<div class="daily-plot">'+t.plot+'</div>':'')+
        '<div class="daily-task '+t.priority+'">'+t.task+'</div>'+
        detail+
      '</div>'+badge+'</div>';
  }).join('');
  return'<div class="daily-card"><div class="daily-hd">'+hd+'</div>'+rows+'</div>';
}
function renderDiseaseRisk(risks,wx){
  if(!risks||!risks.length)return'';
  const t=Math.round(wx.temp??25),h=wx.humidity??65,r=(wx.rain??0).toFixed(1),s=(wx.sunshine??0).toFixed(1);
  const meta='<div style="font-size:.68rem;color:var(--ink-soft);margin-bottom:8px">今日推估：'+t+'°C · 濕度~'+h+'% · 雨量 '+r+'mm · 日照 '+s+'h</div>';
  const rows=risks.map(rs=>{
    const lv=rs.score>=70?'<span class="risk-level hi">高風險</span>':'<span class="risk-level mid">中風險</span>';
    return '<div class="risk-row">'+lv+'<div class="risk-info"><div class="risk-name">'+rs.name+'</div>'+
      '<div class="risk-sym">'+rs.sym+'</div><div class="risk-adv">→ '+rs.adv+'</div></div>'+
      '<div class="risk-score">'+rs.score+'分</div></div>';
  }).join('');
  return '<div class="risk-card"><div class="risk-hd">🦠 天氣驅動病害風險</div>'+meta+rows+
    '<div style="font-size:.65rem;color:var(--ink-soft);margin-top:8px">條件推算，非診斷。出現症狀請到【診斷】頁查閱，或洽農業改良場。</div></div>';
}

    advice.forEach(a=>{const col=a.lv==="warn"?"var(--warn)":a.lv==="ok"?"var(--harv)":"var(--ink)";
      html+='<div class="rec"><span class="rt" style="color:'+col+'">'+a.t+'</span></div>';});
    html+='</div><button class="btn" id="k-done">完成（已更新田區與今日待辦）</button>';
    document.getElementById("k-res").innerHTML=html;
    document.getElementById("k-go").style.display="none";
    document.getElementById("k-done").onclick=()=>{mr.innerHTML="";renderDash();};
  };
}

    if(todayRecs.length)todayRecs.forEach(x=>{const m=RTYPES[x.type];txt+="  · "+m.t+"："+(x.ec?"EC"+x.ec+"/pH"+(x.ph||"?"):x.qty?x.qty+"kg":x.note||"")+"\n";});

      txt+="  · 黏板("+md(parseD(li.date))+"): "+(warns.length?warns.map(([k,v])=>k+v+"隻").join("、"):"無蟲")+(warns.some(([k,v])=>v>=IPM_THR[k])?" ⚠超標建議用藥":"")+"\n";
    }});
  txt+="\n（請顧問就上述現況給施肥/灌溉/用藥與後續管理建議）";
  mr.innerHTML='<div class="modal-bg" id="mbg2"><div class="modal"><h3>匯出今日摘要</h3><p class="note">複製以下文字，貼給顧問或 AI 助手做定期檢視與建議。</p>'+
    '<textarea class="t" id="exp-t" style="min-height:220px;font-size:.8rem" readonly>'+txt.replace(/</g,"&lt;")+'</textarea>'+
    '<button class="btn" id="exp-copy">複製</button><button class="btn sec" id="exp-x">關閉</button></div></div>';
  document.getElementById("exp-x").onclick=()=>mr.innerHTML="";
  document.getElementById("mbg2").onclick=e=>{if(e.target.id==="mbg2")mr.innerHTML="";};
  document.getElementById("exp-copy").onclick=()=>{const ta=document.getElementById("exp-t");ta.select();try{document.execCommand("copy");document.getElementById("exp-copy").textContent="已複製 ✓";}catch(e){}};

/* ---------- 田區詳情 ---------- */
function openPlot(i){CUR=i;go("plots");renderPlots();}
function renderPlots(){
  const plots=load();const v=document.getElementById("view-plots");
  if(CUR===null){ // 列表 + 新增
    let opts=Object.keys(CROPS).map(n=>'<option>'+n+'</option>').join("");
    let list=plots.length?plots.map((r,i)=>{const[st,cls,age]=stageOf(r);
      return '<div class="card tap" data-i="'+i+'"><div class="card-top"><h3>'+r.plot+'　<span class="crop">'+r.crop+'</span></h3><span class="stage '+cls+'">'+st+'</span></div><div class="sub">定植 '+r.date+'　·　'+(r.plants||"?")+' 株　·　'+(age>=0?"第 "+age+" 天":"未定植")+'　·　紀錄 '+((r.records||[]).length)+' 筆</div></div>';}).join(""):'<div class="empty">尚無田區，用下方表單新增。</div>';
    v.innerHTML='<h2>我的田區</h2><p class="note">點田區可登錄施肥/用藥/採收等紀錄。資料存在你的手機。</p>'+list+
      '<div class="card"><h3 style="margin:0 0 2px">＋ 新增田區</h3>'+
      '<label class="f">畦區名稱</label><input class="t" id="np" placeholder="例如 A區">'+
      '<label class="f">作物</label><select class="t" id="nc">'+opts+'</select>'+
      '<div class="row2"><div><label class="f">定植日</label><input class="t" id="nd" type="date" value="'+fmtD(today())+'"></div>'+
      '<div><label class="f">株數</label><input class="t" id="nn" type="number" value="300"></div></div>'+
      '<button class="btn" id="addp">新增田區</button></div>';
    v.querySelector("#addp").onclick=()=>{const p=load();p.push({plot:v.querySelector("#np").value.trim()||"未命名",crop:v.querySelector("#nc").value,date:v.querySelector("#nd").value,plants:+v.querySelector("#nn").value||0,records:[]});save(p);renderPlots();};
    v.querySelectorAll(".card.tap").forEach(cd=>cd.onclick=()=>openPlot(+cd.dataset.i));
    return;
  }
  // 詳情
  const r=plots[CUR];if(!r){CUR=null;return renderPlots();}
  const c=CROPS[r.crop];const[st,cls,age]=stageOf(r);
  const gpct=age<0?0:Math.min(100,Math.round(age/c.grow*100));
  const o=tasksFor(r);const phi=phiLock(r);const ht=harvestTotal(r);
  // IPM 黏板狀態
  const lastIpm=(r.records||[]).filter(x=>x.type==="ipm").sort((a,b)=>b.date<a.date?-1:1)[0]||null;
  const ipmAlerts=lastIpm?Object.entries({粉蝨:+lastIpm.wf,薊馬:+lastIpm.th,葉蟎:+lastIpm.sm,蚜蟲:+lastIpm.ap}).filter(([k,v])=>v>=IPM_THR[k]).map(([k,v])=>k+"("+v+"隻≥門檻"+IPM_THR[k]+")"):[null];
  const ipmWarn=lastIpm&&ipmAlerts.length?'<span class="pill">🪤 '+ipmAlerts.join("、")+'　建議查植保系統用藥</span>':lastIpm?'<span class="pill ok">🪤 黏板正常（'+md(parseD(lastIpm.date))+'）</span>':'<span class="pill" style="background:var(--grow-bg);color:var(--grow)">🪤 尚未黏板巡查</span>';
  const dyn=getDyn(CUR);
  let dynHtml=dyn.length?'<div class="card" style="border-color:var(--warn)"><h3 style="margin:0 0 4px;font-size:1rem;color:var(--warn)">📝 今日回報動態調整</h3>'+
    dyn.map((d,di)=>{const k="farm-"+fmtD(today())+"-"+CUR+"-dyn"+di;const ck=localStorage.getItem(k)==="1";
      return '<label class="task"><input type="checkbox" data-k="'+k+'"'+(ck?" checked":"")+'><span>'+d+'</span></label>';}).join("")+'</div>':"";
  let tasks=(o.today||[]).map((t,ti)=>{const k="farm-"+fmtD(today())+"-"+CUR+"-"+ti;const ck=localStorage.getItem(k)==="1";
    return '<label class="task"><input type="checkbox" data-k="'+k+'"'+(ck?" checked":"")+'><span>'+t+'</span></label>';}).join("");
  let soon=(o.soon&&o.soon.length)?'<div class="soon"><b>未來7天：</b>'+o.soon.join("；")+'</div>':"";
  // 紀錄歷史
  let recs=(r.records||[]).slice().sort((a,b)=>b.date<a.date?-1:1).map((rc,ri)=>{
    const meta=RTYPES[rc.type]||{t:rc.type,c:"obs"};
    let extra=rc.type==="ecph"?("EC "+(rc.ec||"?")+" / pH "+(rc.ph||"?")):rc.type==="harv"?(rc.qty+" kg"+((rc.g1!=null&&(rc.g2||rc.g3))?"（特"+rc.g1+"/優"+rc.g2+"/次"+rc.g3+"）":"")):rc.type==="spray"?((rc.target?"防"+rc.target+"：":"")+rc.note+(rc.dose?" "+rc.dose:"")+(rc.phi?"（安全期"+rc.phi+"天）":"")):rc.type==="ipm"?((["粉蝨"+rc.wf,"薊馬"+rc.th,"葉蟎"+rc.sm,"蚜蟲"+rc.ap].filter(s=>!/0$/.test(s)).join("・")||"無蟲")+(rc.note?" ｜ "+rc.note:"")):rc.type==="cost"?((rc.category?rc.category+"：":"")+"NT$"+(+rc.amount||0).toLocaleString()+(rc.note?" ｜ "+rc.note:"")):rc.note||"";
    return '<div class="rec"><span class="rd">'+md(parseD(rc.date))+'</span><span class="rt"><span class="rtag '+meta.c+'">'+meta.t+'</span>'+extra+'</span><button class="del" data-r="'+ri+'">刪</button></div>';}).join("");
  let ecHist=(r.records||[]).filter(x=>x.type==="ecph"&&x.ec).slice(-12);
  const[,ecTarget]=ecStage(c,age);
  let ecChart="";
  if(ecHist.length>=2){
    const bars=ecHist.map(x=>{
      const ec=+x.ec,tg=ecTarget;
      const h=Math.min(100,Math.round(ec/4*100));
      const col=ec>Math.max(3.5,tg*1.35)?'var(--warn)':ec<tg*0.6?'var(--grow)':'var(--accent)';
      return '<div class="bar" style="height:'+h+'%;background:'+col+'"><b>'+x.ec+'</b><span>'+md(parseD(x.date))+'</span></div>';
    }).join('');
    const phRow=ecHist.map(x=>{
      const ph=+x.ph;
      const ok=x.ph&&ph>=6.0&&ph<=6.8;const warn=x.ph&&(ph<5.5||ph>7.2);
      const col=warn?'var(--warn)':ok?'var(--blue)':'var(--ink-soft)';
      const bg=warn?'var(--warn-bg)':ok?'var(--accent-soft)':'transparent';
      return '<div class="chart-ph-v" style="color:'+col+';background:'+bg+'">'+(x.ph||'—')+'</div>';
    }).join('');
    ecChart='<div class="res"><h4>EC / pH 趨勢（近 '+ecHist.length+' 筆）</h4>'+
      '<div style="font-size:.7rem;color:var(--ink-soft);margin-bottom:4px">目標 EC <b style="color:var(--accent)">'+ecTarget+'</b> dS/m　pH 目標 <b style="color:var(--blue)">6.0–6.8</b></div>'+
      '<div class="chart">'+bars+'</div>'+
      '<div class="chart-ph"><span class="chart-ph-lbl">pH</span>'+phRow+'</div></div>';
  }

  let harvHist=(r.records||[]).filter(x=>x.type==="harv"&&(+x.qty||0)>0).slice(-10);
  let harvChart="";
  if(harvHist.length>=2){
    const maxQ=Math.max(...harvHist.map(x=>+x.qty||0));
    const hbars=harvHist.map(x=>{
      const qty=+x.qty||0;const h=Math.min(100,Math.round(qty/maxQ*100));
      const col=x.g2||x.g3?'var(--harv)':'var(--accent)';
      return '<div class="bar" style="height:'+h+'%;background:'+col+'"><b>'+qty+'</b><span>'+md(parseD(x.date))+'</span></div>';
    }).join('');
    const htotal=Math.round(harvHist.reduce((a,x)=>a+(+x.qty||0),0)*10)/10;
    harvChart='<div class="res"><h4>採收量趨勢（近 '+harvHist.length+' 筆，共 '+htotal+' kg）</h4>'+
      '<div class="chart">'+hbars+'</div></div>';
  }

  v.innerHTML='<button class="back" id="bk">‹ 返回</button>'+
    '<div class="card"><div class="card-top"><h3>'+r.plot+'　<span class="crop">'+r.crop+'</span></h3><span class="stage '+cls+'">'+st+'</span></div>'+
    '<div class="sub">定植 '+r.date+'　·　'+(r.plants||"?")+' 株　·　'+c.科+'</div>'+
    '<div class="prog"><i class="'+(age>=c.grow?'h':'g')+'" style="width:'+Math.max(age<0?0:Math.round(age/(c.grow+c.dur)*100),2)+'%"></i></div>'+
    '<div class="prog-l"><span>第 '+Math.max(age,0)+' 天</span><span>'+(age>=c.grow?"採收期":"距採收 "+(c.grow-age)+" 天")+'</span></div>'+
    (phi?'<span class="pill">⚠ 用藥安全期至 '+md(phi)+' 禁止採收</span>':'')+
    (ht?'<span class="pill ok">累計採收 '+(Math.round(ht*10)/10)+' kg</span>':'')+
    ((()=>{const g=harvestGrades(r);return (g.g2||g.g3)?'<span class="pill ok" style="background:var(--accent-soft);color:var(--accent)">特'+g.g1+'/優'+g.g2+'/次'+g.g3+' kg</span>':'';})())+
    ((()=>{const costs=(r.records||[]).filter(x=>x.type==='cost'&&x.amount);if(!costs.length)return'';const tot=costs.reduce((a,x)=>a+(+x.amount||0),0);return '<span class="pill" style="background:var(--grow-bg);color:var(--grow)">💰 累計成本 NT$'+Math.round(tot).toLocaleString()+'</span>';})())+
    ipmWarn+'</div>'+
    dynHtml+
    (tasks?'<div class="card"><h3 style="margin:0 0 4px;font-size:1rem">今日待辦</h3>'+tasks+soon+'</div>':'')+
    '<div class="card"><h3 style="margin:0 0 8px;font-size:1rem">快速登錄紀錄</h3><div class="qlog">'+
      '<button data-log="fert"><span class="qi">💊</span>施肥</button>'+
      '<button data-log="spray"><span class="qi">🧴</span>用藥</button>'+
      '<button data-log="harv"><span class="qi">🧺</span>採收</button>'+
      '<button data-log="ecph"><span class="qi">🌡️</span>EC/pH</button>'+
      '<button data-log="work"><span class="qi">✂️</span>作業</button>'+
      '<button data-log="obs"><span class="qi">👀</span>觀察</button>'+
      '<button data-log="ipm"><span class="qi">🪤</span>黏板巡查</button>'+
      '<button data-log="cost"><span class="qi">💰</span>成本登錄</button>'+
      '<button data-log="ai" style="grid-column:1/-1;background:var(--accent);color:#fff;border:none"><span class="qi">📸</span>每日拍照 + AI 診斷</button></div></div>'+
    ecChart+
    harvChart+
    '<div class="card"><h3 style="margin:0 0 6px;font-size:1rem">紀錄歷史 <span style="color:var(--ink-soft);font-weight:400;font-size:.8rem">('+((r.records||[]).length)+' 筆)</span></h3>'+(recs||'<div class="empty" style="padding:16px">尚無紀錄，用上方按鈕登錄。</div>')+'</div>'+
    '<button class="btn sec" id="delp">刪除此田區</button>';
  v.querySelector("#bk").onclick=()=>{CUR=null;renderPlots();};
  v.querySelector("#delp").onclick=()=>{if(confirm("確定刪除「"+r.plot+"」及其所有紀錄？")){const p=load();p.splice(CUR,1);save(p);CUR=null;renderPlots();}};
  v.querySelectorAll(".task input").forEach(b=>b.onchange=()=>localStorage.setItem(b.dataset.k,b.checked?"1":"0"));
  v.querySelectorAll("[data-log]").forEach(b=>b.onclick=()=>b.dataset.log==="ai"?aiModal():logModal(b.dataset.log));
  v.querySelectorAll(".del[data-r]").forEach(b=>b.onclick=()=>{const p=load();p[CUR].records.splice(+b.dataset.r,1);save(p);renderPlots();});
}

// 壓縮圖片為 dataURL（長邊 max 1024、JPEG 0.7），控制上傳大小
function compressImage(file,max,q){return new Promise((res,rej)=>{
  const img=new Image();const url=URL.createObjectURL(file);
  img.onload=()=>{URL.revokeObjectURL(url);let w=img.width,h=img.height;
    if(Math.max(w,h)>max){if(w>=h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;}}
    const c=document.createElement("canvas");c.width=w;c.height=h;
    c.getContext("2d").drawImage(img,0,0,w,h);res(c.toDataURL("image/jpeg",q));};
  img.onerror=()=>{URL.revokeObjectURL(url);rej(new Error("讀取圖片失敗"));};img.src=url;});}

    // 收入試算：預填該作物累計特/優/次（可改）
    let g={g1:0,g2:0,g3:0};load().forEach(r=>{if(r.crop===appCrop){const gg=harvestGrades(r);g.g1+=gg.g1;g.g2+=gg.g2;g.g3+=gg.g3;}});

    res.innerHTML='<div class="res" style="margin-top:12px"><h4>📊 '+d.crop+'　各市場行情（元/kg）</h4>'+

      rows+'<div class="foot" style="text-align:left">'+range+' 交易量加權平均。⭐ 該價位最高市場。點 ★ 設常送市場。資料來源：農業部 AMIS。</div></div>'+calc;
    const rev=()=>{const q1=+v.querySelector("#mk-q1").value||0,q2=+v.querySelector("#mk-q2").value||0,q3=+v.querySelector("#mk-q3").value||0;

    }catch(e){

      const gradeNote=rc.type==="harv"?((rc.g2||rc.g3)?"分級 特"+(rc.g1||0)+"/優"+(rc.g2||0)+"/次"+(rc.g3||0)+"kg":"產量"):"";
      csv+=[rc.date,r.plot,r.crop,ty,rc.target||"",mat,dose,rc.phi||"",gradeNote].map(x=>'"'+String(x).replace(/"/g,'""')+'"').join(",")+"\n";});});
    v.querySelector("#rb-res").innerHTML=n?'<div class="res"><h4>紀錄簿（'+n+' 筆，CSV）</h4><textarea class="t" style="min-height:180px;font-size:.72rem" readonly id="rb-t">'+csv.replace(/</g,"&lt;")+'</textarea><button class="btn" id="rb-copy">複製 CSV</button><div class="foot" style="text-align:left">可貼進 Excel 或匯入產銷履歷系統。用藥紀錄請確認符合植保系統登記藥、稀釋倍數與安全採收期。</div></div>':'<div class="info">尚無用藥/施肥/採收紀錄。到田區登錄後即可匯出。</div>';
    const cp=v.querySelector("#rb-copy");if(cp)cp.onclick=()=>{const ta=v.querySelector("#rb-t");ta.select();try{document.execCommand("copy");cp.textContent="已複製 ✓";}catch(e){}};
  };
  // 備份：下載 JSON
  v.querySelector("#bk-exp").onclick=()=>{
    const data={version:2,exported:fmtD(today()),plots:load(),contracts:loadC()};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);const a=document.createElement("a");

    URL.revokeObjectURL(url);
    v.querySelector("#bk-res").innerHTML='<div class="info">已下載備份檔案，請存到相簿或雲端。</div>';
  };
  // 還原：讀取 JSON

      }catch(err){v.querySelector("#bk-res").innerHTML='<div class="info" style="color:var(--warn)">檔案格式錯誤：'+err.message+'</div>';}

  (function(){const s=loadSync();if(s.configText)v.querySelector("#sy-cfg").value=s.configText;

  v.querySelector("#sy-save").onclick=()=>{
    const res=v.querySelector("#sy-res");

      const cfg=parseCfg(cfgText);if(!cfg.projectId||!cfg.apiKey)throw new Error("設定缺 apiKey / projectId");
      const s=loadSync();s.config=cfg;s.configText=cfgText;s.code=code;s.auto=v.querySelector("#sy-auto").checked;saveSync(s);
      res.innerHTML='<div class="info">✓ 已儲存。可按上傳/下載測試，或開自動同步。</div>';

/* ---------- 契作管理 ---------- */
// 累計某作物在區間內可交貨量（kg），跨全部田區。有分級時只計特+優（次級不供契作）
function harvestOfCrop(crop,from,to){
  let sum=0;load().forEach(r=>{if(r.crop!==crop)return;(r.records||[]).forEach(x=>{
    if(x.type!=="harv")return;const d=x.date;if(d<from||d>to)return;
    const deliver=(x.g1!=null||x.g2!=null)?((+x.g1||0)+(+x.g2||0)):(+x.qty||0);
    sum+=deliver;});});
  return Math.round(sum*10)/10;
}
function renderContract(){
  const v=document.getElementById("view-contract");
  const cs=loadC();const t=fmtD(today());
  let cropOpts=Object.keys(CROPS).map(n=>'<option>'+n+'</option>').join("");
  // 新增表單
  let form='<div class="card"><h3 style="margin:0 0 6px;font-size:1rem">＋ 新增契約</h3>'+
    '<div class="row2"><div><label class="f">買方（通路/合作社）</label><input class="t" id="ct-buyer" placeholder="例如 全聯／有機店"></div>'+
    '<div><label class="f">作物</label><select class="t" id="ct-crop">'+cropOpts+'</select></div></div>'+
    '<div class="row2"><div><label class="f">保底價（元/kg）</label><input class="t" id="ct-price" type="number" placeholder="45"></div>'+
    '<div><label class="f">每週供應量（kg）</label><input class="t" id="ct-week" type="number" placeholder="100"></div></div>'+
    '<div class="row2"><div><label class="f">起始日</label><input class="t" id="ct-start" type="date" value="'+t+'"></div>'+
    '<div><label class="f">結束日</label><input class="t" id="ct-end" type="date"></div></div>'+
    '<label class="f">分級規格</label><input class="t" id="ct-grade" placeholder="例如 單果150g以上、色澤均勻、無日燒裂果">'+
    '<div class="row2"><div><label class="f">認證要求</label><input class="t" id="ct-cert" placeholder="產銷履歷/有機"></div>'+
    '<div><label class="f">付款週期</label><input class="t" id="ct-pay" placeholder="月結30天"></div></div>'+
    '<label class="f">備註</label><input class="t" id="ct-note" placeholder="計價方式、拒收處理、不可抗力…">'+
    '<button class="btn" id="ct-add">新增契約</button></div>';
  // 契約清單
  let list="";
  if(!cs.length){list='<div class="empty" style="padding:22px">尚無契約。<br>新增契約後，系統會依採收紀錄自動追蹤供貨進度，並提示契作或走市場。</div>';}
  else{
    cs.forEach((c,i)=>{
      const cr=CROPS[c.crop];
      // 本期供貨進度：起始~今日，週數×週量 = 應供；實際採收累計
      const start=c.start,end=c.end||t,upto=(t<end?t:end);
      const weeks=Math.max(0,Math.floor((parseD(upto)-parseD(start))/(7*DAY)))+1;
      const need=(+c.week||0)*weeks;
      const got=harvestOfCrop(c.crop,start,upto);
      const rate=need>0?Math.round(got/need*100):0;
      const gap=Math.round((got-need)*10)/10;
      const barCls=rate>=100?"h":"g";
      const gapTxt=gap>=0?'<span class="pill ok">達標，餘 '+gap+' kg 可走市場</span>':'<span class="pill">缺口 '+(-gap)+' kg，注意履約</span>';
      // 契作 vs 市場：用當月價指數判斷
      const mIdx=cr?cr.idx[new Date().getMonth()]:1;
      let mkt=mIdx<=0.9?['ok','🟢 目前市場爛價（指數'+mIdx.toFixed(2)+'）→ 契作保底最划算']:
              mIdx>=1.15?['','🔴 目前市場旺季（指數'+mIdx.toFixed(2)+'）→ 超出承諾量可考慮留量走市場']:
              ['','🟡 市場平盤（指數'+mIdx.toFixed(2)+'）→ 依承諾穩定供貨'];
      // 量力而為：近4週實際週均 vs 承諾週量
      const from4=fmtD(addD(today(),-28));
      const got4=harvestOfCrop(c.crop,from4,t);
      const wk4=Math.round(got4/4*10)/10;
      let cap=wk4>0?(wk4< (+c.week||0)?'<div class="info" style="margin-top:8px;background:var(--warn-bg);color:var(--warn)">⚠️ 近4週實際週均僅 '+wk4+' kg，低於承諾 '+c.week+' kg／週。承諾量宜 ≤ 穩定產能 70–80%，避免違約。</div>':'<div class="info" style="margin-top:8px">近4週週均 '+wk4+' kg，高於承諾，產能充足。</div>'):'';
      const expired=c.end&&t>c.end;
      const soon=c.end&&!expired&&(parseD(c.end)-today())<=14*DAY;
      list+='<div class="card"'+(expired?' style="opacity:.6"':'')+'>'+
        '<div class="card-top"><h3>'+c.buyer+'　<span class="crop">'+c.crop+'</span></h3>'+
        (expired?'<span class="stage pre">已到期</span>':soon?'<span class="stage grow">將到期</span>':'<span class="stage harv">履約中</span>')+'</div>'+
        '<div class="sub">保底 '+(c.price||"?")+' 元/kg　·　每週 '+(c.week||"?")+' kg　·　'+c.start+' ~ '+(c.end||"未定")+'</div>'+
        (c.grade?'<div style="font-size:.8rem;color:var(--ink-soft);margin:2px 0">規格：'+c.grade+'</div>':'')+
        (c.cert?'<div style="font-size:.8rem;color:var(--ink-soft)">認證：'+c.cert+(c.pay?'　·　付款：'+c.pay:'')+'</div>':(c.pay?'<div style="font-size:.8rem;color:var(--ink-soft)">付款：'+c.pay+'</div>':''))+
        '<div style="margin-top:10px"><div class="prog"><i class="'+barCls+'" style="width:'+Math.min(rate,100)+'%"></i></div>'+
        '<div class="prog-l"><span>可交貨(特+優) '+got+' / 應供 '+need+' kg</span><span>'+rate+'%</span></div></div>'+
        gapTxt+'<br><span class="pill '+mkt[0]+'" style="margin-top:6px">'+mkt[1]+'</span>'+
        cap+
        (c.note?'<div style="font-size:.78rem;color:var(--ink-soft);margin-top:8px">備註：'+c.note+'</div>':'')+
        '<button class="del" data-cd="'+i+'" style="margin-top:8px">刪除契約</button></div>';
    });
  }
  v.innerHTML='<h2>契作管理</h2><p class="note">登錄契約後，系統依採收紀錄追蹤供貨達標率，並提示「契作保底 vs 走市場」與量力而為。契約低價的意義是保住爛價期不虧本。</p>'+
    list+form+
    '<div class="foot" style="text-align:left">簽約前確認：所有權移轉時點、計價方式、天災/拒收風險由誰負擔、分級與驗收標準。承諾量建議 ≤ 穩定產能 70–80%，保留緩衝分散風險。</div>';
  const add=v.querySelector("#ct-add");
  add.onclick=()=>{
    const c={buyer:v.querySelector("#ct-buyer").value.trim()||"未命名買方",crop:v.querySelector("#ct-crop").value,
      price:v.querySelector("#ct-price").value,week:v.querySelector("#ct-week").value,
      start:v.querySelector("#ct-start").value,end:v.querySelector("#ct-end").value,
      grade:v.querySelector("#ct-grade").value.trim(),cert:v.querySelector("#ct-cert").value.trim(),
      pay:v.querySelector("#ct-pay").value.trim(),note:v.querySelector("#ct-note").value.trim()};
    const cs2=loadC();cs2.push(c);saveC(cs2);renderContract();
  };
  v.querySelectorAll(".del[data-cd]").forEach(b=>b.onclick=()=>{if(confirm("刪除此契約？")){const cs2=loadC();cs2.splice(+b.dataset.cd,1);saveC(cs2);renderContract();}});
}

/* ---------- 導覽 ---------- */
function go(v){
  document.querySelectorAll("nav button").forEach(x=>x.classList.toggle("on",x.dataset.v===v));
  ["dash","plots","contract","diag","tools"].forEach(id=>document.getElementById("view-"+id).classList.toggle("hidden",id!==v));
  const T={dash:"經營總覽",plots:"我的田區",contract:"契作管理",diag:"診斷",tools:"工具"};document.getElementById("title").textContent=T[v];
  if(v==="dash")renderDash();if(v==="plots")renderPlots();if(v==="contract")renderContract();if(v==="diag")renderDiag();if(v==="tools")renderTools();
}
document.querySelectorAll("nav button").forEach(b=>b.onclick=()=>{if(b.dataset.v==="plots")CUR=null;go(b.dataset.v);});
// 套用已校正的真實月價指數（若有）覆蓋示範值
applyIdxOverride();
const APP_VERSION="OMO-v3 · 0722";
const t=today();document.getElementById("hd-date").innerHTML=fmtD(t)+"<br>星期"+["日","一","二","三","四","五","六"][t.getDay()]+'<br><span style="color:#fff;font-weight:700;opacity:.95">'+APP_VERSION+'</span>';
renderDash();
// 啟動時：若開了自動同步，先從雲端拉取最新，再重繪
(async function(){const s=loadSync();if(s.auto&&s.config&&s.code){try{await cloudPull();_lastPushSnap=JSON.stringify(snapshot());go("dash");}catch(e){}}})();
setInterval(autoSyncTick,15000);
window.addEventListener("visibilitychange",()=>{if(document.visibilityState==="hidden")autoSyncTick();});

// 不再註冊 Service Worker：主動卸載任何殘留的舊 SW 並清除快取，確保永遠拿到最新版。
if("serviceWorker" in navigator){
  navigator.serviceWorker.getRegistrations().then(rs=>rs.forEach(r=>r.unregister())).catch(()=>{});
  if(window.caches&&caches.keys)caches.keys().then(ks=>ks.forEach(k=>caches.delete(k))).catch(()=>{});
}
</script>
