<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#3B6B4A">
<link rel="manifest" href="./manifest.webmanifest">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="農務小幫手">
<title>農務小幫手</title>
<style>
:root{
  --paper:#F4F2EB;--ink:#222820;--ink-soft:#5C6353;--line:#DCE0D2;--card:#FFFFFF;--card2:#FAF9F4;
  --accent:#1F9E4C;--accent-d:#17803C;--accent-soft:#DCF0E0;
  --harv:#4E8C5A;--harv-bg:#E4EFE2;--grow:#B9832A;--grow-bg:#F4E9D2;--pre:#78806F;--pre-bg:#EAECE3;
  --warn:#B5533C;--warn-bg:#F4E1DA;--done:#9AA391;--blue:#3E6B84;
}
@media (prefers-color-scheme:dark){:root{
  --paper:#14170F;--ink:#E9EBE1;--ink-soft:#9FA595;--line:#2C3226;--card:#1D2218;--card2:#191E14;
  --accent:#3FCB74;--accent-d:#2FA85C;--accent-soft:#17301F;
  --harv:#77BE86;--harv-bg:#212F1D;--grow:#D6A94E;--grow-bg:#2D2713;--pre:#868E7C;--pre-bg:#22271C;
  --warn:#D9846B;--warn-bg:#2E1D16;--done:#5B6350;--blue:#77A6BE;
}}
:root[data-theme="light"]{--paper:#F4F2EB;--ink:#222820;--ink-soft:#5C6353;--line:#DCE0D2;--card:#FFFFFF;--card2:#FAF9F4;--accent:#1F9E4C;--accent-d:#17803C;--accent-soft:#DCF0E0;--harv:#4E8C5A;--harv-bg:#E4EFE2;--grow:#B9832A;--grow-bg:#F4E9D2;--pre:#78806F;--pre-bg:#EAECE3;--warn:#B5533C;--warn-bg:#F4E1DA;--done:#9AA391;--blue:#3E6B84;}
:root[data-theme="dark"]{--paper:#14170F;--ink:#E9EBE1;--ink-soft:#9FA595;--line:#2C3226;--card:#1D2218;--card2:#191E14;--accent:#3FCB74;--accent-d:#2FA85C;--accent-soft:#17301F;--harv:#77BE86;--harv-bg:#212F1D;--grow:#D6A94E;--grow-bg:#2D2713;--pre:#868E7C;--pre-bg:#22271C;--warn:#D9846B;--warn-bg:#2E1D16;--done:#5B6350;--blue:#77A6BE;}
*{box-sizing:border-box;}
body{margin:0;background:var(--paper);color:var(--ink);font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;line-height:1.55;-webkit-font-smoothing:antialiased;}
:root{--disp:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;}
.app{max-width:600px;margin:0 auto;padding:14px 14px 92px;}
header{display:flex;justify-content:space-between;align-items:flex-end;gap:10px;background:var(--accent);color:#fff;border-radius:20px;padding:16px 18px 17px;margin-bottom:18px;box-shadow:0 4px 16px rgba(0,0,0,.12);}
.eyebrow{display:inline-flex;align-items:center;gap:6px;font-size:.64rem;letter-spacing:.16em;text-transform:uppercase;color:#fff;background:rgba(255,255,255,.22);font-weight:800;padding:4px 11px;border-radius:20px;}
.eyebrow::before{content:"";width:7px;height:7px;border-radius:50%;background:#fff;flex:none;}
h1{font-family:var(--disp);font-size:2.15rem;letter-spacing:-.01em;font-weight:800;line-height:1.05;color:#fff;margin:.2em 0 0;}
.hd-date{font-size:.78rem;color:rgba(255,255,255,.9);text-align:right;font-weight:600;flex:none;}
h2{font-family:var(--disp);font-size:1.4rem;font-weight:800;letter-spacing:-.01em;margin:4px 0 3px;display:flex;align-items:center;gap:9px;}
h2::before{content:"";width:5px;height:1.05em;border-radius:3px;background:var(--accent);flex:none;}
.note{font-size:.82rem;color:var(--ink-soft);margin:0 0 13px;}
.sec-h{display:flex;justify-content:space-between;align-items:baseline;margin:20px 0 8px;}
.sec-h h3{font-size:.98rem;margin:0;}
.sec-h span{font-size:.78rem;color:var(--ink-soft);}
/* KPI */
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 6px;text-align:center;box-shadow:0 1px 2px rgba(0,0,0,.04);}
.kpi b{display:block;font-family:var(--disp);font-size:2.3rem;font-weight:800;line-height:1;color:var(--accent);font-variant-numeric:tabular-nums;letter-spacing:-.02em;}
.kpi.warn b{color:var(--warn);}
.kpi small{font-size:.68rem;color:var(--ink-soft);display:block;margin-top:5px;}
/* card */
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px;margin-bottom:12px;box-shadow:0 1px 2px rgba(0,0,0,.04);}
.card.tap{cursor:pointer;transition:transform .08s;}
.card.tap:active{transform:scale(.99);}
.card-top{display:flex;justify-content:space-between;align-items:center;gap:8px;}
.card-top h3{font-size:1.06rem;margin:0;}
.crop{color:var(--accent);}
.stage{font-size:.68rem;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;}
.stage.harv{background:var(--harv-bg);color:var(--harv);}.stage.grow{background:var(--grow-bg);color:var(--grow);}
.stage.pre{background:var(--pre-bg);color:var(--pre);}
.sub{font-size:.78rem;color:var(--ink-soft);margin:4px 0 9px;}
.prog{height:9px;background:var(--line);border-radius:6px;overflow:hidden;position:relative;}
.prog i{display:block;height:100%;border-radius:6px;}
.prog i.g{background:linear-gradient(90deg,var(--accent),var(--harv));}
.prog i.h{background:var(--harv);}
.prog-l{display:flex;justify-content:space-between;font-size:.72rem;color:var(--ink-soft);margin-top:5px;font-variant-numeric:tabular-nums;}
.pill{display:inline-block;font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--warn-bg);color:var(--warn);margin-top:8px;}
.pill.ok{background:var(--harv-bg);color:var(--harv);}
/* task */
.task{display:flex;align-items:flex-start;gap:10px;padding:10px 3px;border-bottom:1px solid var(--line);cursor:pointer;}
.task:last-child{border-bottom:none;}
.task input{width:22px;height:22px;margin:0;flex-shrink:0;accent-color:var(--accent);}
.task span{font-size:.93rem;}
.task input:checked+span{color:var(--done);text-decoration:line-through;}
.soon{margin-top:9px;padding-top:8px;border-top:1px dashed var(--line);font-size:.82rem;color:var(--ink-soft);}
.info{font-size:.88rem;background:var(--accent-soft);border-radius:9px;padding:9px 11px;margin:6px 0;}
/* forms */
label.f{display:block;font-size:.78rem;color:var(--ink-soft);font-weight:600;margin:11px 0 4px;}
input.t,select.t,textarea.t{width:100%;padding:10px 11px;border:1px solid var(--line);border-radius:10px;background:var(--card2);color:var(--ink);font-size:.98rem;font-family:inherit;}
textarea.t{resize:vertical;min-height:52px;}
button{font-family:inherit;cursor:pointer;border:none;border-radius:12px;font-weight:600;}
.btn{background:var(--accent);color:#fff;padding:13px;width:100%;margin-top:14px;font-size:1rem;font-weight:700;letter-spacing:.03em;transition:transform .08s;}
.btn:active{transform:scale(.985);}
@media (prefers-color-scheme:dark){.btn{color:#12160f;}}
:root[data-theme="dark"] .btn{color:#12160f;}
.btn.sec{background:transparent;color:var(--accent);border:1.5px solid var(--accent);}
.del{background:transparent;color:var(--warn);font-size:.8rem;padding:4px 6px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
/* quick log */
.qlog{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:6px 0 4px;}
.qlog button{background:var(--card2);border:1px solid var(--line);color:var(--ink);padding:11px 4px;font-size:.82rem;display:flex;flex-direction:column;gap:4px;align-items:center;}
.qlog button .qi{font-size:1.3rem;}
/* records */
.rec{display:flex;gap:10px;padding:9px 2px;border-bottom:1px solid var(--line);font-size:.86rem;}
.rec:last-child{border-bottom:none;}
.rec .rd{color:var(--ink-soft);font-variant-numeric:tabular-nums;white-space:nowrap;font-size:.8rem;min-width:42px;}
.rec .rt{flex:1;}
.rtag{display:inline-block;font-size:.66rem;font-weight:700;padding:1px 7px;border-radius:20px;margin-right:6px;}
.rtag.fert{background:var(--grow-bg);color:var(--grow);}
.rtag.spray{background:var(--warn-bg);color:var(--warn);}
.rtag.harv{background:var(--harv-bg);color:var(--harv);}
.rtag.ecph{background:var(--accent-soft);color:var(--accent);}
.rtag.obs{background:var(--pre-bg);color:var(--pre);}
.rtag.work{background:#E3EAEE;color:var(--blue);}
.rtag.ipm{background:#EEE8F4;color:#6B44A0;}
@media (prefers-color-scheme:dark){.rtag.work{background:#1C2A31;}.rtag.ipm{background:#2A1D38;color:#A97FD6;}}
:root[data-theme="dark"] .rtag.work{background:#1C2A31;}:root[data-theme="dark"] .rtag.ipm{background:#2A1D38;color:#A97FD6;}
.res{background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:13px;margin-top:13px;}
.res h4{margin:0 0 7px;font-size:1.02rem;font-family:var(--disp);font-weight:800;}
.res .r{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--line);font-size:.9rem;}
.res .r:last-child{border-bottom:none;}
.res .r b{font-variant-numeric:tabular-nums;}
.empty{text-align:center;color:var(--ink-soft);padding:34px 12px;font-size:.9rem;}
.back{background:none;color:var(--accent);font-size:.9rem;padding:6px 0;margin-bottom:6px;font-weight:600;}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:.75rem;font-weight:700;font-variant-numeric:tabular-nums;}
.badge.hi{background:var(--harv-bg);color:var(--harv);}.badge.mid{background:var(--grow-bg);color:var(--grow);}.badge.lo{background:var(--warn-bg);color:var(--warn);}
.diag-q{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:12px 14px;margin-bottom:9px;cursor:pointer;font-size:.95rem;display:flex;justify-content:space-between;align-items:center;}
.diag-q:active{background:var(--card2);}
.diag-a{background:var(--warn-bg);border-radius:11px;padding:12px 14px;margin:-4px 0 9px;font-size:.9rem;}
.diag-a b{color:var(--warn);}
/* 診斷頁升級 */
.diag-risk-card{background:var(--warn-bg);border:1.5px solid var(--warn);border-radius:13px;padding:12px 15px;margin-bottom:14px;}
.diag-risk-hd{font-size:.88rem;font-weight:800;color:var(--warn);margin-bottom:7px;}
.diag-risk-item{font-size:.8rem;color:var(--ink);line-height:1.6;padding:3px 0;display:flex;gap:6px;}
.diag-risk-item::before{content:"⚠️";flex:none;}
.diag-safe-card{background:var(--harv-bg);border:1.5px solid var(--harv);border-radius:13px;padding:10px 14px;margin-bottom:14px;font-size:.85rem;color:var(--harv);font-weight:700;display:flex;align-items:center;gap:8px;}
.diag-part-hd{background:var(--card);border:1.5px solid var(--line);border-radius:11px;padding:12px 15px;margin-bottom:6px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:1rem;font-weight:700;}
.diag-part-hd.open{border-color:var(--accent);border-bottom-left-radius:0;border-bottom-right-radius:0;margin-bottom:0;}
.diag-part-body{border:1.5px solid var(--accent);border-top:none;border-bottom-left-radius:11px;border-bottom-right-radius:11px;margin-bottom:10px;display:none;}
.diag-part-body.open{display:block;}
.diag-swrap{border-bottom:1px solid var(--line);}
.diag-swrap:last-child{border-bottom:none;}
.diag-symptom{padding:11px 14px;cursor:pointer;}
.diag-symptom:active{background:var(--card2);}
.diag-symptom-q{font-size:.92rem;font-weight:700;display:flex;justify-content:space-between;align-items:center;gap:6px;}
.diag-hint{font-size:.75rem;color:var(--ink-soft);margin-top:3px;line-height:1.5;}
.diag-symptom-a{font-size:.82rem;line-height:1.65;padding:11px 14px;background:var(--warn-bg);border-top:1px solid var(--line);display:none;}
.diag-symptom-a.open{display:block;}
.diag-symptom-a b{color:var(--warn);display:block;margin-bottom:6px;}
.diag-cta{background:var(--accent-soft);border:1.5px solid var(--accent);border-radius:14px;padding:14px 15px;text-align:center;margin-top:4px;}
.diag-cta-t{font-weight:800;font-size:.95rem;color:var(--accent-d);margin-bottom:5px;}
.diag-cta-s{font-size:.79rem;color:var(--ink-soft);line-height:1.6;}
.chart{display:flex;align-items:flex-end;gap:4px;height:110px;padding:8px 0 18px;}
.chart .bar{flex:1;border-radius:5px 5px 0 0;min-height:3px;position:relative;}
.chart .bar span{position:absolute;bottom:-18px;left:0;right:0;text-align:center;font-size:.6rem;color:var(--ink-soft);}
.chart .bar b{position:absolute;top:-15px;left:0;right:0;text-align:center;font-size:.6rem;color:var(--ink-soft);font-variant-numeric:tabular-nums;}
.chart-ph{display:flex;gap:4px;margin-top:4px;border-top:1px solid var(--line);padding-top:4px;}
.chart-ph-lbl{flex:none;font-size:.6rem;color:var(--ink-soft);padding:2px 4px 0 0;white-space:nowrap;align-self:center;}
.chart-ph-v{flex:1;text-align:center;font-size:.65rem;padding:2px 0;border-radius:4px;font-variant-numeric:tabular-nums;}
.foot{font-size:.74rem;color:var(--ink-soft);text-align:center;margin-top:18px;line-height:1.7;}
nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--line);display:flex;max-width:600px;margin:0 auto;padding-bottom:env(safe-area-inset-bottom);}
nav button{flex:1;background:none;padding:9px 2px 11px;color:var(--ink-soft);font-size:.68rem;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:2px;}
nav button .ic{font-size:1.3rem;line-height:1;}
nav button.on{color:var(--accent);}
.hidden{display:none;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;justify-content:center;z-index:20;}
.modal{background:var(--card);border-radius:18px 18px 0 0;width:100%;max-width:600px;padding:18px 16px calc(20px + env(safe-area-inset-bottom));max-height:88vh;overflow-y:auto;}
.modal h3{margin:0 0 2px;font-size:1.15rem;}
.ec-feedback{font-size:.76rem;padding:4px 9px;border-radius:7px;margin-top:4px;font-weight:700;line-height:1.4;}
.ec-feedback.ok{background:var(--harv-bg);color:var(--harv);}
.ec-feedback.warn{background:var(--warn-bg);color:var(--warn);}
.ec-feedback.info{background:var(--grow-bg);color:var(--grow);}
.stage-hint{font-size:.8rem;padding:7px 11px;border-radius:9px;background:var(--accent-soft);color:var(--accent-d);margin-bottom:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
/* ---------- 桌面版（寬螢幕）：左側選單 + 寬版面 + 置中彈窗 ---------- */
@media (min-width:900px){
  .app{max-width:960px;margin:0 auto 0 250px;padding:22px 30px 40px;}
  header{padding-top:8px;}
  h1{font-size:1.8rem;}
  nav{position:fixed;top:0;left:0;bottom:0;right:auto;width:220px;max-width:none;margin:0;
      flex-direction:column;align-items:stretch;border-top:none;border-right:1px solid var(--line);
      padding:22px 12px;gap:4px;background:var(--card);}
  nav::before{content:"農務小幫手";display:block;font-family:var(--disp);font-weight:800;font-size:1.2rem;
      font-weight:700;color:var(--accent);padding:0 12px 14px;margin-bottom:6px;border-bottom:1px solid var(--line);}
  nav button{flex:none;flex-direction:row;justify-content:flex-start;gap:12px;padding:12px 14px;
      font-size:.95rem;border-radius:11px;text-align:left;}
  nav button .ic{font-size:1.25rem;}
  nav button.on{background:var(--accent-soft);}
  .kpis{gap:10px;}
  .kpi b{font-size:2rem;}
  /* 彈窗置中、卡片式 */
  .modal-bg{align-items:center;}
  .modal{border-radius:18px;max-width:520px;max-height:86vh;padding:22px 22px;}
  /* 診斷、工具在寬螢幕不必貼滿，維持易讀寬度 */
}
@media (min-width:1400px){
  .app{margin-left:auto;padding-left:30px;}
  nav{left:max(0px,calc(50% - 700px));}
}
/* 天氣預報小工具 */
.wx-card{background:linear-gradient(135deg,var(--accent-d) 0%,var(--accent) 100%);color:#fff;border-radius:18px;padding:13px 15px 10px;margin-bottom:14px;box-shadow:0 3px 14px rgba(0,0,0,.10);}
.wx-title{font-size:.72rem;font-weight:700;letter-spacing:.06em;opacity:.88;margin-bottom:8px;}
.wx-days{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;}
.wx-day{text-align:center;padding:6px 2px;}
.wx-label{font-size:.62rem;font-weight:700;opacity:.75;}
.wx-icon{font-size:1.4rem;line-height:1.2;margin:2px 0;}
.wx-txt{font-size:.58rem;opacity:.78;margin-bottom:1px;}
.wx-temp{font-size:.82rem;font-weight:700;}
.wx-lo{font-weight:400;opacity:.78;}
.wx-rain{font-size:.65rem;margin-top:2px;}
.wx-foot{font-size:.58rem;opacity:.55;text-align:right;margin-top:7px;}
/* 今日農事決策 */
.dec-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:12px;}
.dec-hd{font-size:.8rem;font-weight:700;color:var(--ink-soft);margin-bottom:8px;display:flex;justify-content:space-between;align-items:baseline;}
.dec-src{font-size:.63rem;font-weight:400;color:var(--done);}
.dec-row{display:flex;align-items:baseline;gap:8px;padding:6px 0;border-bottom:1px solid var(--line);font-size:.82rem;line-height:1.4;}
.dec-row:last-child{border-bottom:none;}
.dec-cat{flex:none;font-weight:800;font-size:.72rem;width:4.5em;}
.dec-cat.hi{color:var(--warn);}.dec-cat.mid{color:var(--grow);}.dec-cat.ok{color:var(--harv);}
.dec-dot{flex:none;font-size:.55rem;margin-top:.1em;}
.dec-dot.hi{color:var(--warn);}.dec-dot.mid{color:var(--grow);}.dec-dot.ok{color:var(--harv);}
.dec-msg{flex:1;color:var(--ink-soft);}
/* 天氣驅動病害風險 */
.risk-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:12px;}
.risk-hd{display:flex;align-items:center;gap:7px;font-size:.82rem;font-weight:700;margin-bottom:6px;color:var(--ink-soft);}
.risk-row{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid var(--line);}
.risk-row:last-child{border-bottom:none;}
.risk-level{font-size:.63rem;font-weight:800;padding:2px 7px;border-radius:20px;white-space:nowrap;flex:none;margin-top:2px;}
.risk-level.hi{background:var(--warn-bg);color:var(--warn);}.risk-level.mid{background:var(--grow-bg);color:var(--grow);}
.risk-info{flex:1;min-width:0;}
.risk-name{font-size:.88rem;font-weight:700;}
.risk-sym{font-size:.7rem;color:var(--ink-soft);margin-top:1px;}
.risk-adv{font-size:.7rem;color:var(--blue);margin-top:2px;}
.risk-score{font-size:.67rem;color:var(--ink-soft);flex:none;font-variant-numeric:tabular-nums;padding-top:3px;}
/* 今日智慧行動清單 */
.daily-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:12px;}
.daily-hd{font-size:.8rem;font-weight:700;color:var(--ink-soft);margin-bottom:8px;display:flex;justify-content:space-between;align-items:baseline;}
.daily-row{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);font-size:.82rem;line-height:1.45;}
.daily-row:last-child{border-bottom:none;}
.daily-icon{flex:none;font-size:1.1rem;line-height:1;padding-top:.1em;}
.daily-body{flex:1;min-width:0;}
.daily-plot{font-size:.65rem;font-weight:700;color:var(--ink-soft);margin-bottom:2px;letter-spacing:.04em;text-transform:uppercase;}
.daily-task{font-size:.85rem;font-weight:700;line-height:1.3;}
.daily-task.urgent{color:var(--warn);}
.daily-detail{font-size:.7rem;color:var(--ink-soft);margin-top:3px;line-height:1.5;}
.daily-badge{font-size:.6rem;font-weight:800;padding:2px 7px;border-radius:20px;white-space:nowrap;flex:none;margin-top:3px;}
.daily-badge.urgent{background:var(--warn-bg);color:var(--warn);}
.daily-badge.today{background:var(--accent-soft);color:var(--accent);}
/* 新手學習指引 */
.guide-card{background:var(--card);border:1.5px solid var(--accent);border-radius:14px;padding:13px 15px;margin-bottom:12px;position:relative;overflow:hidden;}
.guide-card::before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,var(--accent-soft) 0%,transparent 60%);opacity:.45;pointer-events:none;}
.guide-hd{display:flex;align-items:center;gap:9px;margin-bottom:8px;position:relative;}
.guide-icon{font-size:1.4rem;flex:none;}
.guide-title{font-weight:800;font-size:.93rem;color:var(--accent-d);flex:1;}
.guide-stage-badge{font-size:.62rem;font-weight:700;background:var(--accent);color:#fff;padding:2px 8px;border-radius:20px;flex:none;}
.guide-what{font-size:.82rem;color:var(--ink);line-height:1.58;margin-bottom:8px;position:relative;}
.guide-focus-hd{font-size:.75rem;font-weight:700;color:var(--ink);margin-bottom:4px;position:relative;}
.guide-focus{margin:0 0 8px;padding:0;list-style:none;position:relative;}
.guide-focus li{font-size:.78rem;padding:2px 0;color:var(--ink-soft);display:flex;gap:5px;}
.guide-focus li::before{content:"→";color:var(--accent);flex:none;}
.guide-howto{border-top:1px solid var(--line);margin-top:9px;padding-top:9px;position:relative;}
.guide-how-lbl{font-size:.73rem;font-weight:700;color:var(--accent-d);margin-bottom:5px;}
.guide-how-item{margin-bottom:5px;}
.guide-how-q{font-size:.8rem;font-weight:700;cursor:pointer;color:var(--accent);display:flex;align-items:center;gap:5px;padding:4px 6px;border-radius:7px;background:var(--accent-soft);}
.guide-how-q::before{content:"▸ ";flex:none;}.guide-how-q.open::before{content:"▾ ";}
.guide-how-q:active{opacity:.8;}
.guide-how-a{font-size:.77rem;color:var(--ink);line-height:1.65;padding:7px 9px;background:var(--card2);border-radius:7px;margin-top:4px;white-space:pre-line;display:none;}
.guide-how-a.open{display:block;}
.guide-tip{font-size:.76rem;background:var(--accent-soft);border-radius:8px;padding:7px 10px;color:var(--accent-d);margin-top:8px;line-height:1.5;position:relative;}
/* 本週重點卡片 */
.week-plan-card{background:var(--card);border:1.5px solid var(--blue);border-radius:14px;padding:13px 15px;margin-bottom:12px;}
.wpc-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.wpc-hd>span:first-child{font-weight:800;font-size:.95rem;color:var(--blue);}
.wpc-badge{font-size:.65rem;font-weight:700;background:var(--blue);color:#fff;padding:2px 9px;border-radius:20px;}
.wpc-stage{font-size:.78rem;color:var(--ink-soft);margin-bottom:9px;padding-bottom:7px;border-bottom:1px solid var(--line);}
.wpc-list{margin:0;padding:0;list-style:none;}
.wpc-list li{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid var(--line);font-size:.83rem;line-height:1.5;align-items:flex-start;}
.wpc-list li:last-child{border-bottom:none;}
.wpc-num{min-width:20px;height:20px;background:var(--blue);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:800;flex:none;margin-top:.15em;}
.wpc-watch{background:var(--warn-bg);border-radius:9px;padding:8px 11px;margin-top:9px;}
.wpc-watch-hd{font-size:.76rem;font-weight:800;color:var(--warn);margin-bottom:5px;}
.wpc-watch ul{margin:0;padding:0 0 0 14px;}
.wpc-watch li{font-size:.78rem;color:var(--ink);line-height:1.55;padding:2px 0;}
/* 作物資訊卡（新增田區選作物時顯示） */
.crop-info-card{background:var(--accent-soft);border:1.5px solid var(--accent);border-radius:13px;padding:12px 14px;margin:8px 0 2px;animation:fadeIn .2s;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.cic-hd{font-size:.9rem;font-weight:800;color:var(--accent-d);margin-bottom:8px;display:flex;align-items:center;gap:7px;}
.cic-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px 14px;margin-bottom:8px;}
.cic-item{font-size:.78rem;line-height:1.4;}
.cic-item b{color:var(--ink);font-weight:700;display:block;}
.cic-item span{color:var(--ink-soft);}
.cic-diff.easy{color:var(--harv);font-weight:800;}
.cic-diff.mid{color:var(--grow);font-weight:800;}
.cic-diff.hard{color:var(--warn);font-weight:800;}
.cic-tip{font-size:.76rem;color:var(--accent-d);background:var(--card);border-radius:9px;padding:8px 10px;line-height:1.6;border-left:3px solid var(--accent);}
/* EC/pH 量測步驟指引 */
.ecguide{background:var(--card2);border:1px solid var(--line);border-radius:10px;margin-bottom:10px;}
.ecguide-q{padding:9px 12px;cursor:pointer;font-size:.82rem;font-weight:700;color:var(--blue);display:flex;justify-content:space-between;align-items:center;user-select:none;}
.ecguide-q::after{content:"▸　展開量測步驟";font-weight:400;font-size:.72rem;color:var(--ink-soft);}
.ecguide-q.open::after{content:"▾　收起";}
.ecguide-body{display:none;padding:2px 12px 10px;}
.ecguide-body.open{display:block;}
.ecguide-step{display:flex;gap:9px;padding:6px 0;border-bottom:1px solid var(--line);font-size:.78rem;line-height:1.55;align-items:flex-start;}
.ecguide-step:last-child{border-bottom:none;}
.ecguide-sn{min-width:20px;height:20px;background:var(--blue);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:800;flex:none;margin-top:.1em;}
.ecguide-st{flex:1;}.ecguide-st b{color:var(--ink);display:block;margin-bottom:1px;}.ecguide-st span{color:var(--ink-soft);}
/* 採收分級指引 */
.hg-timing{font-size:.8rem;background:var(--harv-bg);border-radius:9px;padding:8px 11px;margin-bottom:8px;color:var(--ink);line-height:1.6;}
.hg-timing b{color:var(--harv);}
.hg-grade{display:flex;align-items:flex-start;gap:9px;padding:6px 0;border-bottom:1px solid var(--line);}
.hg-grade:last-child{border-bottom:none;}
.hg-badge{font-size:.64rem;font-weight:800;padding:2px 7px;border-radius:20px;white-space:nowrap;flex:none;margin-top:2px;}
.hg-badge.s{background:var(--grow-bg);color:var(--grow);}
.hg-badge.a{background:var(--accent-soft);color:var(--accent);}
.hg-badge.b{background:var(--pre-bg);color:var(--pre);}
.hg-crit{font-size:.77rem;color:var(--ink);flex:1;line-height:1.5;}
.hg-tip{font-size:.74rem;color:var(--blue);background:var(--card2);border-radius:8px;padding:7px 10px;margin-top:7px;line-height:1.55;}
/* 整枝作業快選晶片 */
.work-chips{display:flex;flex-wrap:wrap;gap:6px;margin:6px 0 10px;}
.work-chip{background:var(--card2);border:1.5px solid var(--line);border-radius:20px;padding:5px 12px;font-size:.8rem;cursor:pointer;color:var(--ink);user-select:none;transition:background .1s,border-color .1s;}
.work-chip:active,.work-chip.sel{background:var(--accent-soft);border-color:var(--accent);color:var(--accent-d);}
/* 葉片症狀速查 */
.sym-wrap{margin:4px 0 10px;}
.sym-table{display:flex;flex-direction:column;gap:5px;margin-top:8px;}
.sym-row{background:var(--card2);border-radius:9px;padding:8px 10px;border-left:3px solid var(--line);}
.sym-row.lv-urgent{border-left-color:var(--warn);}
.sym-row.lv-warn{border-left-color:var(--harv);}
.sym-sym{font-size:.82rem;font-weight:700;color:var(--ink);margin-bottom:2px;}
.sym-cat{display:inline-block;font-size:.66rem;font-weight:700;background:var(--card);border:1px solid var(--line);border-radius:8px;padding:1px 6px;color:var(--ink-soft);margin-left:5px;vertical-align:middle;}
.sym-cause{font-size:.72rem;color:var(--ink-soft);line-height:1.5;margin-bottom:3px;}
.sym-act{font-size:.71rem;color:var(--grow);background:var(--grow-bg);border-radius:6px;padding:3px 7px;line-height:1.5;}
.sym-row.lv-urgent .sym-act{color:var(--warn);background:var(--warn-bg);}
/* IPM 病蟲害識別卡 */
.ipm-guide-wrap{margin:4px 0 10px;}
.ipm-pest-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;}
.ipm-pest-card{background:var(--card2);border:1.5px solid var(--line);border-radius:10px;padding:9px 10px;}
.ipm-pest-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.ipm-pest-name{font-size:.82rem;font-weight:800;color:var(--ink);}
.ipm-pest-thr{font-size:.66rem;font-weight:700;background:var(--warn-bg);color:var(--warn);border-radius:10px;padding:2px 7px;white-space:nowrap;}
.ipm-pest-row{font-size:.72rem;color:var(--ink-soft);line-height:1.55;margin-bottom:2px;}
.ipm-pest-row b{color:var(--ink);font-weight:600;}
.ipm-pest-act{font-size:.71rem;background:var(--grow-bg);color:var(--grow);border-radius:7px;padding:4px 7px;margin-top:5px;line-height:1.5;}
/* 農事行事曆 */
.cal-wrap{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:12px;}
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-bottom:1px solid var(--line);}
.cal-nav button{background:none;border:1px solid var(--line);border-radius:8px;padding:4px 11px;font-size:.78rem;cursor:pointer;color:var(--ink);}
.cal-nav button:active{background:var(--card2);}
.cal-title{font-size:.9rem;font-weight:800;color:var(--ink);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);}
.cal-dow{text-align:center;font-size:.6rem;font-weight:700;color:var(--ink-soft);padding:5px 0;background:var(--card2);border-bottom:1px solid var(--line);}
.cal-cell{min-height:48px;padding:3px 2px 2px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);background:var(--card);}
.cal-cell:nth-child(7n){border-right:none;}
.cal-cell.cal-other{opacity:.3;background:var(--card2);}
.cal-cell.cal-harv{background:var(--harv-bg);}
.cal-cell.cal-today .cal-d{background:var(--accent);color:#fff !important;border-radius:50%;}
.cal-d{font-size:.68rem;font-weight:700;width:20px;height:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 2px;}
.cal-dots{display:flex;flex-wrap:wrap;gap:2px;justify-content:center;padding:0 2px;}
.cal-dot{width:6px;height:6px;border-radius:50%;flex:none;}
.cal-legend{display:flex;flex-wrap:wrap;gap:8px;padding:8px 12px;border-top:1px solid var(--line);background:var(--card2);}
.cal-leg{display:inline-flex;align-items:center;gap:4px;font-size:.63rem;color:var(--ink-soft);}
.cal-events-hd{font-size:.82rem;font-weight:800;color:var(--ink);margin:14px 0 8px;}
.cal-ev-group{margin-bottom:9px;}
.cal-ev-date{font-size:.7rem;font-weight:700;color:var(--ink-soft);margin-bottom:4px;}
.cal-ev-item{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--card);border:1px solid var(--line);border-radius:9px;margin-bottom:4px;border-left:3px solid var(--line);}
.cal-ev-icon{font-size:.85rem;flex:none;}
.cal-ev-body{min-width:0;}
.cal-ev-plot{font-size:.78rem;font-weight:700;color:var(--ink);}
.cal-ev-desc{font-size:.71rem;color:var(--ink-soft);}
/* 新手入門引導 */
.ob-card{background:linear-gradient(135deg,var(--accent-soft) 0%,var(--card) 100%);border:1.5px solid var(--accent);border-radius:16px;padding:16px 16px 12px;margin-bottom:14px;}
.ob-title{font-size:1.05rem;font-weight:900;color:var(--accent-d);margin-bottom:4px;}
.ob-sub{font-size:.78rem;color:var(--ink-soft);margin-bottom:12px;line-height:1.5;}
.ob-steps{display:flex;flex-direction:column;gap:7px;}
.ob-step{background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden;}
.ob-step-hd{display:flex;align-items:center;gap:9px;padding:9px 11px;cursor:pointer;}
.ob-step-hd:active{opacity:.7;}
.ob-num{background:var(--accent);color:#fff;border-radius:50%;width:22px;height:22px;font-size:.72rem;font-weight:800;display:flex;align-items:center;justify-content:center;flex:none;}
.ob-step-title{flex:1;font-size:.82rem;font-weight:700;color:var(--ink);}
.ob-step-arr{font-size:.85rem;color:var(--ink-soft);transition:transform .2s;}
.ob-step-body{display:none;padding:0 11px 10px 42px;font-size:.74rem;color:var(--ink-soft);line-height:1.7;}
.ob-step-body.open{display:block;}
.ob-step-arr.open{transform:rotate(90deg);}
.ob-item{display:flex;gap:7px;margin-bottom:3px;align-items:baseline;}
.ob-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);flex:none;margin-top:6px;}
/* 田區健康評分 */
.hs-badge{display:inline-flex;align-items:center;gap:4px;border-radius:20px;padding:3px 10px;font-size:.72rem;font-weight:800;white-space:nowrap;}
.hs-badge.hs-ok{background:var(--grow-bg);color:var(--grow);}
.hs-badge.hs-good{background:var(--accent-soft);color:var(--accent-d);}
.hs-badge.hs-warn{background:var(--harv-bg);color:var(--harv);}
.hs-badge.hs-bad{background:var(--warn-bg);color:var(--warn);}
/* 今日行動摘要卡 */
.ta-card{background:var(--card);border:1.5px solid var(--accent);border-radius:14px;padding:12px 14px;margin-bottom:12px;}
.ta-hd{font-size:.85rem;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.ta-badge{background:var(--accent);color:#fff;border-radius:20px;padding:2px 9px;font-size:.7rem;font-weight:700;margin-left:auto;}
.ta-card.ta-ok{border-color:var(--grow);}
.ta-card.ta-ok .ta-hd{color:var(--grow);}
.ta-row{display:flex;align-items:center;gap:8px;border-radius:9px;padding:8px 10px;margin-bottom:5px;border:1.5px solid transparent;cursor:pointer;transition:opacity .1s;}
.ta-row:last-child{margin-bottom:0;}
.ta-row:active{opacity:.7;}
.ta-icon{font-size:.95rem;flex:none;}
.ta-info{flex:1;font-size:.82rem;font-weight:600;color:var(--ink);min-width:0;}
.ta-crop{font-size:.72rem;color:var(--ink-soft);font-weight:400;margin-left:4px;}
.ta-msg{font-size:.76rem;flex:none;max-width:48%;text-align:right;line-height:1.3;}
.ta-arr{font-size:.9rem;color:var(--ink-soft);flex:none;margin-left:2px;}
/* 近 7 天活動點圖 */
.act-strip{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 14px 10px;margin:8px 0;}
.act-hd{font-size:.8rem;font-weight:700;color:var(--ink);margin-bottom:9px;display:flex;align-items:baseline;gap:8px;}
.act-hd small{font-size:.7rem;color:var(--ink-soft);font-weight:400;}
.act-days{display:flex;gap:5px;}
.act-day{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;}
.act-dow{font-size:.55rem;color:var(--ink-soft);text-align:center;}
.act-cell{width:100%;aspect-ratio:1;border-radius:8px;background:var(--card2);border:1.5px solid var(--line);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;opacity:.45;}
.act-cell.has{background:var(--accent-soft);border-color:var(--accent);opacity:1;}
.act-cell.today{background:var(--accent);border-color:var(--accent-d);opacity:1;}
.act-num{font-size:.62rem;font-weight:700;line-height:1;}
.act-cell.today .act-num{color:#fff;}
.act-cell.has .act-num{color:var(--accent-d);}
.act-cell:not(.has):not(.today) .act-num{color:var(--ink-soft);}
.act-dots{display:flex;gap:2px;justify-content:center;flex-wrap:wrap;padding:0 2px;}
.act-dot{width:5px;height:5px;border-radius:50%;flex:none;}
.act-hint{font-size:.71rem;color:var(--grow);background:var(--grow-bg);border-radius:7px;padding:5px 9px;margin-top:7px;line-height:1.5;}
/* 本季收益試算卡 */
.profit-card{background:var(--card);border:1.5px solid var(--line);border-radius:13px;padding:14px;margin:10px 0;}
.profit-hd{font-size:.92rem;font-weight:800;color:var(--ink);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.profit-row{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:1px solid var(--line);font-size:.82rem;gap:10px;}
.profit-row:last-child{border-bottom:none;}
.profit-row span{color:var(--ink-soft);flex-shrink:0;}
.profit-row b{color:var(--ink);text-align:right;}
.profit-row.sm{font-size:.72rem;padding:2px 0;color:var(--ink-soft);}
.profit-total{background:var(--card2);border-radius:9px;padding:9px 12px;margin-top:9px;display:flex;justify-content:space-between;align-items:center;}
.profit-total .pl{font-size:.8rem;color:var(--ink-soft);}
.profit-total .pv{font-size:1.15rem;font-weight:800;font-variant-numeric:tabular-nums;}
.profit-total .pv.pos{color:var(--accent);}
.profit-total .pv.neg{color:var(--warn);}
.profit-note{font-size:.68rem;color:var(--ink-soft);margin-top:6px;text-align:right;line-height:1.5;}
/* 智能健康警告卡 */
.health-alerts{margin:8px 0;}
.ha-card{border-radius:11px;padding:10px 12px;margin-bottom:7px;border:1.5px solid transparent;}
.ha-card.ha-warn{background:var(--warn-bg);border-color:var(--warn);}
.ha-card.ha-info{background:var(--grow-bg);border-color:var(--grow);}
.ha-card.ha-harv{background:var(--harv-bg);border-color:var(--harv);}
.ha-top{display:flex;align-items:center;gap:7px;margin-bottom:3px;}
.ha-icon{font-size:1.05rem;flex:none;}
.ha-title{font-size:.85rem;font-weight:800;}
.ha-card.ha-warn .ha-title{color:var(--warn);}
.ha-card.ha-info .ha-title{color:var(--grow);}
.ha-card.ha-harv .ha-title{color:var(--harv);}
.ha-msg{font-size:.76rem;color:var(--ink-soft);line-height:1.55;margin-bottom:5px;}
.ha-btn{background:none;border:1.5px solid currentColor;border-radius:20px;padding:3px 11px;font-size:.73rem;cursor:pointer;color:inherit;transition:opacity .1s;}
.ha-btn:active{opacity:.6;}
/* 生長里程碑時間軸 */
.tl-wrap{background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:12px 14px 10px;margin:8px 0;}
.tl-hd{font-size:.78rem;font-weight:700;color:var(--ink);margin-bottom:10px;}
.tl-hd b{color:var(--accent);}
.tl-bar{height:5px;background:var(--line);border-radius:3px;margin:0 3%;}
.tl-progress{height:100%;background:linear-gradient(90deg,var(--grow),var(--accent));border-radius:3px;transition:width .5s;}
.tl-nodes{display:flex;justify-content:space-between;padding:0;margin-top:4px;}
.tl-node{display:flex;flex-direction:column;align-items:center;gap:1px;flex:1;}
.tl-dot{width:10px;height:10px;border-radius:50%;background:var(--line);border:2px solid var(--card2);flex:none;}
.tl-dot.done{background:var(--grow);border-color:var(--grow);}
.tl-dot.cur{background:var(--accent);border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
.tl-lbl{font-size:.58rem;color:var(--ink-soft);text-align:center;line-height:1.2;margin-top:3px;max-width:42px;word-break:keep-all;}
.tl-lbl.cur{color:var(--accent);font-weight:800;}
.tl-day{font-size:.5rem;color:var(--ink-soft);opacity:.65;text-align:center;}
.tl-cur{font-size:.76rem;background:var(--accent-soft);border-radius:8px;padding:6px 10px;margin-top:8px;color:var(--accent-d);}
.tl-cur b{color:var(--accent);}
.tl-next{font-size:.74rem;background:var(--card);border:1px solid var(--line);border-radius:8px;padding:6px 10px;margin-top:5px;color:var(--ink);line-height:1.55;}
.tl-next b{font-weight:700;}
/* 新手入門清單 */
.onboard-card{background:var(--card);border:1.5px solid var(--accent);border-radius:16px;padding:15px;margin-bottom:14px;}
.onboard-hd{font-size:1.05rem;font-weight:800;color:var(--accent);margin-bottom:4px;display:flex;align-items:center;gap:8px;}
.onboard-sub{font-size:.82rem;color:var(--ink-soft);margin-bottom:12px;line-height:1.5;}
.onboard-step{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:.83rem;line-height:1.45;}
.onboard-step:last-child{border-bottom:none;}
.onboard-num{width:22px;height:22px;background:var(--accent);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:800;flex:none;margin-top:.1em;}
.onboard-body{flex:1;}
.onboard-body b{display:block;font-size:.88rem;color:var(--ink);margin-bottom:2px;}
.onboard-body span{font-size:.75rem;color:var(--ink-soft);}
</style>

</head>
<body>

function loadFirebase(){return new Promise((res,rej)=>{
  if(window.firebase&&window.firebase.firestore){res();return;}
  const base="https://www.gstatic.com/firebasejs/10.12.2/";
  const s1=document.createElement("script");s1.src=base+"firebase-app-compat.js";
  s1.onload=()=>{const s2=document.createElement("script");s2.src=base+"firebase-firestore-compat.js";
    s2.onload=()=>res();s2.onerror=()=>rej(new Error("載入 Firestore SDK 失敗"));document.head.appendChild(s2);};
  s1.onerror=()=>rej(new Error("載入 Firebase SDK 失敗（需連線）"));document.head.appendChild(s1);
});}

function ecStage(c,age){const ks=Object.keys(c.ec);let f=age<=0?0:age>=c.grow?.999:age/c.grow;let i=Math.min(Math.floor(f*ks.length),ks.length-1);return[ks[i],c.ec[ks[i]]];}
function stageOf(rec){const c=CROPS[rec.crop];const age=Math.round((today()-parseD(rec.date))/DAY);if(age<0)return["未定植","pre",age];if(age>=c.grow)return["採收中","harv",age];return["生育中","grow",age];}
function phiLock(rec){// 用藥安全採收期鎖定
  let latest=null;(rec.records||[]).forEach(r=>{if(r.type==="spray"&&r.phi){const end=addD(parseD(r.date),+r.phi);if(!latest||end>latest)latest=end;}});
  if(latest&&latest>today())return latest;return null;}

/* 動態規則引擎：依回報產生警示/新增任務/處置建議 */
function evalCheckin(rec,inp){
  const c=CROPS[rec.crop];const age=Math.round((today()-parseD(rec.date))/DAY);
  const[stg,target]=ecStage(c,age);const out=[];
  if(inp.ec){const ec=+inp.ec;
    if(ec>Math.max(3.5,target*1.3))out.push({lv:"warn",t:"⚠ EC "+ec+" 偏高（目標約"+target+"）→ 今日淋洗鹽分：澆清水沖排、暫停追肥"});
    else if(ec<target*0.6)out.push({lv:"info",t:"EC "+ec+" 偏低（目標約"+target+"）→ 可適度追肥補養分"});
    else out.push({lv:"ok",t:"EC "+ec+" 在合理範圍（目標約"+target+"）"});}
  if(inp.ph){const ph=+inp.ph;
    if(ph<5.5)out.push({lv:"warn",t:"⚠ pH "+ph+" 偏酸 → 施用石灰資材調整，過酸不利益菌與吸收"});
    else if(ph>7.2)out.push({lv:"warn",t:"⚠ pH "+ph+" 偏鹼 → 酸化調整，注意微量元素固定"});}
  if(inp.pest&&inp.pest!=="無"){
    out.push({lv:"warn",t:"🪤 發現「"+inp.pest+"」→ 加掛黃色黏板監測密度；達門檻才查植保系統合法用藥並鎖安全採收期"});
    if(inp.pest.indexOf("病")>=0||inp.pest.indexOf("毒")>=0)out.push({lv:"warn",t:"疑似病害 → 立即拔除病株移出園外、避免擴散；工具消毒"});}
  if(inp.weather&&inp.weather!=="正常"){
    const w=inp.weather;
    if(w.indexOf("低溫")>=0||w.indexOf("寒")>=0)out.push({lv:"warn",t:"🌡️ "+w+" → 夜間保溫（覆蓋/加溫），花果期低於15℃易落花落果"});
    if(w.indexOf("豪雨")>=0||w.indexOf("颱")>=0)out.push({lv:"warn",t:"🌧️ "+w+" → 加強排水、暫緩採收、穩定介質水分防裂果、綁固支架"});
    if(w.indexOf("高溫")>=0||w.indexOf("乾")>=0)out.push({lv:"info",t:"☀️ "+w+" → 遮陰降溫、增加灌溉但保持穩定，注意薊馬/蟎"});}
  if(inp.symptom&&inp.symptom!==""){
    let found=null;
    for(const pt of SYMPTOM_DB){const s=pt.items.find(x=>x.q===inp.symptom);if(s){found=s;break;}}
    if(found)out.push({lv:"warn",t:"🔍 "+inp.symptom+"｜可能原因："+found.c+" → "+found.a.split('\n')[0]});
    else{const d=DIAG.find(x=>x.q===inp.symptom);if(d)out.push({lv:"warn",t:"🔍 "+inp.symptom+"：可能"+d.c+" → "+d.a});}}
  return out;
}

function tasksFor(rec){
  const c=CROPS[rec.crop];const plant=parseD(rec.date);const age=Math.round((today()-plant)/DAY);
  const out={age,today:[],soon:[]};if(age<0){out.pre=(-age);return out;}
  if(age>c.grow+c.dur+30){out.done=1;return out;}
  c.sched.forEach(([d,t])=>{const df=d-age;if(df===0)out.today.push("📋 "+t);else if(df>0&&df<=7)out.soon.push(md(addD(plant,d))+"（"+df+"天）"+t);});
  const[stg,ecv]=ecStage(c,age);
  out.today.push("🌡️ 抄錄 EC/pH（"+stg+"，目標約"+ecv+"）");
  out.today.push("👀 巡視植株異常（黃化/捲葉/落花/裂果）");
  if(age%7===0)out.today.push("🪤 黏板巡查病蟲害");
  if(age>=c.grow){out.today.push("🧺 採收期第"+(age-c.grow)+"天：分批採收、記錄產量");}
  else if(c.grow-age<=7&&c.grow-age>0)out.soon.push(md(addD(plant,c.grow))+"（"+(c.grow-age)+"天）預計開始採收");
  return out;
}

let _wxCache=null,_wxAt=0;

async function fetchWeather(){

function wxAlerts(wx){
  const hints=[];const d=wx.daily||{};
  const rain1=d.precipitation_probability_max?d.precipitation_probability_max[1]:0;
  const rain2=d.precipitation_probability_max?d.precipitation_probability_max[2]:0;

  const tmin1=d.temperature_2m_min?d.temperature_2m_min[1]:20;

  if(rain1>=60)hints.push('☔ 明日降雨機率 '+rain1+'%：<b>今日宜完成施藥 / 施肥</b>，避免雨水稀釋與農藥飄移');
  if(rain1>=60&&rain2>=60)hints.push('🌧 明後兩日持續降雨：溫室加強通風防灰黴，排水清通，適度減少灌溉');
  if(tmin0<12)hints.push('🌡 今夜低溫 '+tmin0+'°C：<b>夜間保溫</b>（低於 15°C 易落花落果），必要時加溫 / 覆蓋');
  else if(tmin1<12)hints.push('🌡 明夜預測低溫 '+tmin1+'°C：提前準備保溫設施');
  if(tmax0>=32)hints.push('☀️ 今日高溫 '+tmax0+'°C：遮陰降溫、增加灌溉，注意薊馬 / 蟎密度');
  return hints;

function renderWeatherWidget(wx){
  const d=wx.daily;if(!d||!d.time)return'';

function loadWx(container){
  (async()=>{
    try{
      const wx=await fetchWeather();
      const el=container.querySelector('#wx-widget');if(el)el.innerHTML=renderWeatherWidget(wx);
      const hints=wxAlerts(wx);
      if(hints.length){
        const ha=container.querySelector('#wx-alerts');
        if(ha){ha.innerHTML=hints.map(h=>'<div class="info" style="margin-bottom:6px;background:var(--warn-bg);color:var(--warn)">'+h+'</div>').join('');ha.style.display='';}
      }
    }catch(e){/* 離線或受限網路時靜默忽略 */}
    // 每日智慧行動清單 — 呼叫 daily Function（天氣×病害×田區狀態統一整合）
    try{
      const dr=container.querySelector('#disease-risk');if(!dr)return;
      const plots=load();
      // 計算每個田區的狀態摘要，傳給後端做精準評分
      function daysSinceType(rec,type){
        const rs=(rec.records||[]).filter(r=>r.type===type);
        if(!rs.length)return null;
        const last=rs.map(r=>parseD(r.date)).reduce((a,b)=>a>b?a:b);
        return Math.round((today()-last)/DAY);
      }
      const plotSummaries=plots.map(rec=>{
        const c=CROPS[rec.crop];const[,,ageDays]=stageOf(rec);
        const isHarvesting=ageDays>=0&&ageDays>=c.grow;
        const phi=phiLock(rec);
        let stageLabel='';
        if(ageDays<0)stageLabel='定植期';
        else if(isHarvesting)stageLabel='採收期';
        else{const[sn]=ecStage(c,ageDays);stageLabel=sn||'';}
        const isDone=ageDays>c.grow+c.dur+30;
        return{
          plot:rec.plot,crop:rec.crop,stage:stageLabel,ageDays,isHarvesting,isDone,
          daysToHarvest:c.grow-ageDays,
          inPHI:!!phi,phiEndStr:phi?md(phi):null,
          ecLastDays:daysSinceType(rec,'ecph'),
          ipmLastDays:daysSinceType(rec,'ipm'),
          sprayLastDays:daysSinceType(rec,'spray'),
        };
      });
      const resp=await fetch('/.netlify/functions/daily',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({plots:plotSummaries})
      });
      if(resp.ok){
        const data=await resp.json();
        _dailyData=data;
        dr.innerHTML=renderDecisions(data.decisions,data.weather)+
          renderDailyTasks(data.tasks)+
          renderDiseaseRisk(data.risks,data.weather);
        // 採收期田區自動抓 AMIS 行情
        const harvCrops=plots.filter(rec=>{const[,,age]=stageOf(rec);return age>=0&&age>=CROPS[rec.crop].grow;}).map(rec=>rec.crop);
        if(harvCrops.length)loadAmisWidget(container,harvCrops);
      }
    }catch(e){/* 離線 / 本機開發時靜默忽略 */}
  })();
}

    ?'<span class="dec-src">📡 '+wx.stations+'</span>'
    :'<span class="dec-src">🌐 Open-Meteo 預報</span>';

/* 依生育天數選出對應的學習指引 */
function stageGuideKey(c,age){
  if(age<0)return"定植前";
  if(age>=c.grow)return"採收期";
  if(age<=14)return"苗期";
  if(age<=c.grow*0.5)return"生長期"; // 前半段生長期
  if(age<=c.grow*0.7)return"花期";   // 開花期
  return"果期";                        // 後段果實發育
}

    return'<div class="dec-row">'+

      '下貨→ <b>'+bL.market+'</b> <b style="color:var(--grow)">'+bL.lower+'</b> 元/kg</span></div>';
  }).join('');
  if(!rows.trim())return'';
  return'<div class="dec-card">'+
    '<div class="dec-hd">🏷️ 今日市場行情快報（AMIS 近7天）'+
    '<button onclick="go(\'tools\')" style="border:none;background:var(--accent-soft);color:var(--accent);font-size:.65rem;font-weight:700;padding:2px 9px;border-radius:20px;cursor:pointer;margin-left:auto">→ 完整比價</button></div>'+
    rows+
    '<div style="font-size:.62rem;color:var(--done);margin-top:4px">交易量加權平均價。上貨送上價最高市場，下貨送下價最高市場。</div></div>';
}
async function loadAmisWidget(container,harvestingCrops){
  const el=container.querySelector('#amis-widget');if(!el||!harvestingCrops.length)return;
  const dateKey=fmtD(today());
  if(_amisWidgetCache.date===dateKey&&_amisWidgetCache.data){
    el.innerHTML=renderAmisWidget(_amisWidgetCache.data);return;
  }
  const uniqueApp=[...new Set(harvestingCrops)];
  const results=[];
  for(const appCrop of uniqueApp){
    const crop=AMIS_NAME[appCrop]||appCrop;
    try{
      const end=today();const start=addD(end,-6);
      const r=await fetch('/.netlify/functions/amis',{method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({crop,start:fmtD(start),end:fmtD(end)})});
      if(!r.ok)continue;
      const d=await r.json();
      if(d.markets&&d.markets.length)results.push({appCrop,markets:d.markets});
    }catch(e){continue;}
  }
  if(!results.length)return;
  _amisWidgetCache={date:dateKey,data:results};
  el.innerHTML=renderAmisWidget(results);
}

    if(o.done)return;
    if(o.pre){
      items.push({plot:r.plot,icon:'⏳',task:'定植倒數 '+o.pre+' 天',detail:'查看「田區」→「本週重點」，先完成定植前準備作業',priority:'info'});
      return;
    }
    (o.today||[]).forEach(t=>{
      if(t.startsWith('📋')){
        items.push({plot:r.plot,icon:'📌',task:t.slice(3),detail:'',priority:'sched'});
      }else if(t.startsWith('🧺')){
        items.push({plot:r.plot,icon:'🧺',task:t.slice(3),detail:'採收當天早上先量 EC/pH 確認品質，採後立即秤重記錄',priority:'harv'});
      }else if(t.includes('EC/pH')){
        items.push({plot:r.plot,icon:'🌡️',task:t.replace(/^[^ ]+ /,''),detail:'每天同一時段量（建議早上），並在「田區」→「新增紀錄」存檔',priority:'daily'});
      }else if(t.includes('巡視')){
        items.push({plot:r.plot,icon:'👀',task:t.replace(/^[^ ]+ /,''),detail:'順序：頂葉→中葉→老葉→果實→莖基部。發現異狀拍照後到【診斷】查閱',priority:'daily'});
      }else if(t.includes('黏板')){
        items.push({plot:r.plot,icon:'🪤',task:t.replace(/^[^ ]+ /,''),detail:'黃板（粉蝨/蚜）+ 藍板（薊馬）。數量超過 10 隻/片 → 記錄 IPM，考慮施藥',priority:'daily'});
      }
    });
  });
  if(!items.length)return'';
  const order={sched:0,harv:1,daily:2,info:3};
  items.sort((a,b)=>(order[a.priority]||9)-(order[b.priority]||9));
  const urgCnt=items.filter(x=>x.priority==='sched'||x.priority==='harv').length;
  const multi=plots.filter(r=>{const o=tasksFor(r);return!o.done;}).length>1;
  const rows=items.map(item=>{
    const cls=(item.priority==='sched'||item.priority==='harv')?' urgent':'';
    const badge=item.priority==='sched'?'<span class="daily-badge urgent">排程</span>'
      :item.priority==='harv'?'<span class="daily-badge urgent">採收</span>'
      :item.priority==='info'?'<span class="daily-badge today">準備</span>'
      :'<span class="daily-badge today">每日</span>';
    return'<div class="daily-row">'+
      '<div class="daily-icon">'+item.icon+'</div>'+
      '<div class="daily-body">'+
      (multi?'<div class="daily-plot">'+item.plot+'</div>':'')+
      '<div class="daily-task'+cls+'">'+item.task+'</div>'+
      (item.detail?'<div class="daily-detail">'+item.detail+'</div>':'')+
      '</div>'+badge+'</div>';
  }).join('');
  let soonRows='';
  plots.forEach(r=>{const o=tasksFor(r);if(o.done||o.pre)return;(o.soon||[]).forEach(t=>{soonRows+='<div style="font-size:.73rem;color:var(--ink);padding:3px 0;border-bottom:1px solid var(--line);line-height:1.4">'+
    (multi?'<b style="color:var(--ink-soft)">'+r.plot+'</b>　':'')+t+'</div>';});});
  const upHtml=soonRows?'<div style="margin-top:9px;padding:8px 10px;background:var(--card2);border-radius:9px">'+
    '<div style="font-size:.7rem;font-weight:700;color:var(--ink-soft);margin-bottom:5px">📅 7 天內即將</div>'+soonRows+'</div>':'';
  const hd=urgCnt
    ?'今日必做 <span style="font-size:.65rem;color:var(--warn);font-weight:700">★ '+urgCnt+' 項重要排程</span>'
    :'今日必做';
  return'<div class="daily-card">'+
    '<div class="daily-hd">🎯 '+hd+'<span style="font-size:.6rem;font-weight:400;color:var(--done)">本機計算・不需網路</span></div>'+
    rows+upHtml+'</div>';
}

    const gpct=age<0?0:Math.min(100,Math.round(age/c.grow*100));
    const toHarv=c.grow-age;
    const phi=phiLock(r);const ht=harvestTotal(r);
    let statusline=age<0?(-age)+" 天後定植":age>=c.grow?"採收中 · 累計 "+ht+" kg":"距採收 "+toHarv+" 天";

      '<div class="sub">定植 '+r.date+'　·　'+(r.plants||"?")+' 株　·　'+statusline+'</div>'+
      '<div class="prog">'+bar+'</div>'+
      '<div class="prog-l"><span>定植</span><span>'+(age>=c.grow?"採收期":"生育 "+gpct+"%")+'</span><span>結束</span></div>'+pill+'</div>';
  });

  // 近期採收 + 今日任務摘要
  let upcoming=plots.map(r=>{const c=CROPS[r.crop];const[,,age]=stageOf(r);const d=c.grow-age;return{r,d,age,c};})
    .filter(x=>x.age>=0&&x.d>0&&x.d<=30).sort((a,b)=>a.d-b.d);
  let up=upcoming.length?'<div class="card">'+upcoming.map(x=>'<div class="rec"><span class="rd">'+x.d+'天</span><span class="rt"><b>'+x.r.plot+' '+x.r.crop+'</b> 預計 '+md(addD(parseD(x.r.date),x.c.grow))+' 開始採收</span></div>').join("")+'</div>':'';

  v.innerHTML=kpi+

  v.querySelectorAll(".card.tap").forEach(cd=>cd.addEventListener("click",()=>openPlot(+cd.dataset.i)));
  const cb=v.querySelector("#checkin");if(cb)cb.onclick=()=>checkinModal();
  const ex=v.querySelector("#export");if(ex)ex.onclick=()=>exportModal();
  loadWx(v);
}

/* 每日回報：引導式問答 → 即時決策 */
function checkinModal(){
  const plots=load();const mr=document.getElementById("modal-root");
  if(!plots.length){mr.innerHTML='<div class="modal-bg" id="mbg"><div class="modal"><h3>📝 今日回報</h3><p class="note">請先在「我的田區」頁新增田區。</p><button class="btn sec" id="k-cancel">關閉</button></div></div>';document.getElementById("k-cancel").onclick=()=>mr.innerHTML="";return;}
  let opts=plots.map((r,i)=>'<option value="'+i+'">'+r.plot+' · '+r.crop+'</option>').join("");
  // 症狀下拉：用 SYMPTOM_DB 分群
  let symp='<option value="">無</option>';
  SYMPTOM_DB.forEach(pt=>{symp+='<optgroup label="'+pt.part+'">';pt.items.forEach(s=>{symp+='<option>'+s.q+'</option>';});symp+='</optgroup>';});
  mr.innerHTML='<div class="modal-bg" id="mbg"><div class="modal"><h3>📝 今日回報</h3>'+
    '<p class="note">輸入今日量測數值，系統立即顯示是否正常並給出今日建議。</p>'+
    '<div id="wx-sum"></div>'+
    '<label class="f">哪個田區？</label><select class="t" id="k-plot">'+opts+'</select>'+
    '<div id="k-stage-hint"></div>'+
    '<div class="row2">'+
      '<div><label class="f">介質 EC (dS/m)</label><input class="t" id="k-ec" type="number" step="0.1" placeholder="如 2.5"><div id="k-ec-fb" class="ec-feedback" style="display:none"></div></div>'+
      '<div><label class="f">pH</label><input class="t" id="k-ph" type="number" step="0.1" placeholder="如 6.5"><div id="k-ph-fb" class="ec-feedback" style="display:none"></div></div>'+
    '</div>'+
    '<label class="f">今日觀察到的植株症狀</label><select class="t" id="k-symp">'+symp+'</select>'+
    '<label class="f">病蟲害發現</label><select class="t" id="k-pest"><option>無</option><option>粉蝨</option><option>薊馬</option><option>蟎類</option><option>蚜蟲</option><option>疑似病害（斑點/萎凋）</option><option>疑似病毒病</option></select>'+
    '<label class="f">天氣/環境</label><select class="t" id="k-wx"><option>正常</option><option>低溫寒流</option><option>豪雨/颱風</option><option>高溫乾燥</option></select>'+
    '<label class="f">今日施作（選填）</label><input class="t" id="k-work" placeholder="如 摘側芽、追肥">'+
    '<button class="btn" id="k-go">分析並給建議</button><button class="btn sec" id="k-cancel">取消</button>'+
    '<div id="k-res"></div></div></div>';
  document.getElementById("k-cancel").onclick=()=>mr.innerHTML="";
  document.getElementById("mbg").onclick=e=>{if(e.target.id==="mbg")mr.innerHTML="";};

  // 取得目前選定田區的階段與 EC 目標
  function curPlotInfo(){
    const idx=+document.getElementById("k-plot").value;
    const r=load()[idx];if(!r)return null;
    const c=CROPS[r.crop];const age=Math.round((today()-parseD(r.date))/DAY);
    const[stg,ecTarget]=ecStage(c,age);
    return{r,c,age,stg,ecTarget};
  }

  // 更新「階段提示」區塊
  function updateStageHint(){
    const info=curPlotInfo();const el=document.getElementById("k-stage-hint");if(!el)return;
    if(!info){el.innerHTML="";return;}
    const{r,age,stg,ecTarget}=info;
    el.innerHTML='<div class="stage-hint">📍 <b>'+r.crop+'</b> · '+stg+'（第 '+Math.max(age,0)+' 天）'+
      '&emsp;目標 EC <b>'+ecTarget+' dS/m</b>&emsp;pH 目標 <b>6.0–6.8</b></div>';
    refreshFeedback();
  }

  // EC 即時回饋
  function refreshEcFb(){
    const info=curPlotInfo();const el=document.getElementById("k-ec");const fb=document.getElementById("k-ec-fb");if(!el||!fb)return;
    const val=el.value;if(!val){fb.style.display="none";return;}
    const ec=+val;const tgt=info?info.ecTarget:2.5;
    let cls,msg;
    if(ec>Math.max(3.6,tgt*1.3)){cls="warn";msg="⚠ 偏高（目標 "+tgt+" dS/m） → 今日澆清水淋洗，暫停追肥";}
    else if(ec<tgt*0.6){cls="info";msg="↓ 偏低（目標 "+tgt+" dS/m） → 可適量追肥補充養分";}
    else{cls="ok";msg="✓ EC 正常（目標 "+tgt+" dS/m）";}
    fb.className="ec-feedback "+cls;fb.textContent=msg;fb.style.display="block";
  }

  // pH 即時回饋
  function refreshPhFb(){
    const el=document.getElementById("k-ph");const fb=document.getElementById("k-ph-fb");if(!el||!fb)return;
    const val=el.value;if(!val){fb.style.display="none";return;}
    const ph=+val;let cls,msg;
    if(ph<5.5){cls="warn";msg="⚠ 偏酸（< 5.5） → 施用石灰資材調整，過酸影響養分吸收";}
    else if(ph>7.2){cls="warn";msg="⚠ 偏鹼（> 7.2） → 以磷酸調低 pH，注意微量元素被固定";}
    else if(ph<6.0){cls="info";msg="△ 略偏酸（最佳 6.0–6.8），可稍微向上調整";}
    else if(ph>6.8){cls="info";msg="△ 略偏鹼（最佳 6.0–6.8），可稍微向下調整";}
    else{cls="ok";msg="✓ pH 正常（6.0–6.8）";}
    fb.className="ec-feedback "+cls;fb.textContent=msg;fb.style.display="block";
  }

  function refreshFeedback(){refreshEcFb();refreshPhFb();}

  document.getElementById("k-plot").onchange=updateStageHint;
  document.getElementById("k-ec").oninput=refreshEcFb;
  document.getElementById("k-ph").oninput=refreshPhFb;
  updateStageHint(); // 初始化

  // 自動帶入今日天氣
  (async()=>{
    try{
      const wx=await fetchWeather();const d=wx.daily||{};
      const code=d.weathercode?d.weathercode[0]:0;
      const hi=d.temperature_2m_max?Math.round(d.temperature_2m_max[0]):'?';
      const lo=d.temperature_2m_min?Math.round(d.temperature_2m_min[0]):'?';
      const rain0=d.precipitation_probability_max?d.precipitation_probability_max[0]:0;
      const rain1=d.precipitation_probability_max?d.precipitation_probability_max[1]:0;
      const ws=document.getElementById('wx-sum');
      if(ws){
        const note=rain1>=60?'<div class="info" style="margin-top:4px;background:var(--warn-bg);color:var(--warn)">☔ 明日降雨機率 '+rain1+'%：<b>今日宜完成施藥/施肥</b></div>':'';
        ws.innerHTML='<div class="info" style="margin-bottom:8px;display:flex;align-items:center;gap:8px">'+
          '<span style="font-size:1.2rem">'+(WMO_EMOJI[code]||'🌡')+'</span>'+
          '<span>今日 <b>'+(WMO_TXT[code]||'')+'</b>　高 '+hi+'°C / 低 '+lo+'°C　降雨機率 '+rain0+'%</span></div>'+note;
      }
      const wxSel=document.getElementById('k-wx');
      if(wxSel){
        const tmin=d.temperature_2m_min?d.temperature_2m_min[0]:20;
        const tmax=d.temperature_2m_max?d.temperature_2m_max[0]:25;
        let wxVal='正常';
        if(tmin<10)wxVal='低溫寒流';
        else if(rain0>=60||[61,63,65,80,81,82,95,96,99].includes(code))wxVal='豪雨/颱風';
        else if(tmax>=32)wxVal='高溫乾燥';
        for(const opt of wxSel.options){if(opt.value===wxVal){opt.selected=true;break;}}
      }
    }catch(e){}
  })();

  document.getElementById("k-go").onclick=()=>{
    const idx=+document.getElementById("k-plot").value;const rec=load()[idx];
    const inp={ec:document.getElementById("k-ec").value,ph:document.getElementById("k-ph").value,
      pest:document.getElementById("k-pest").value,weather:document.getElementById("k-wx").value,
      symptom:document.getElementById("k-symp").value,work:document.getElementById("k-work").value};
    const advice=evalCheckin(rec,inp);
    const p=load();p[idx].records=p[idx].records||[];
    if(inp.ec||inp.ph)p[idx].records.push({type:"ecph",date:fmtD(today()),ec:inp.ec,ph:inp.ph});
    if(inp.work)p[idx].records.push({type:"work",date:fmtD(today()),note:inp.work});
    if(inp.pest&&inp.pest!=="無")p[idx].records.push({type:"obs",date:fmtD(today()),note:"發現"+inp.pest});
    if(inp.symptom&&inp.symptom!=="")p[idx].records.push({type:"obs",date:fmtD(today()),note:inp.symptom});
    save(p);
    const dyn=advice.filter(a=>a.lv==="warn").map(a=>a.t);setDyn(idx,dyn);
    let html='<div class="res"><h4>今日建議（'+rec.plot+'）</h4>';
    if(!advice.length)html+='<div class="rec"><span class="rt">✅ 現況正常，依原定待辦執行即可。</span></div>';
    advice.forEach(a=>{const col=a.lv==="warn"?"var(--warn)":a.lv==="ok"?"var(--harv)":"var(--grow)";
      html+='<div class="rec"><span class="rt" style="color:'+col+'">'+a.t+'</span></div>';});
    html+='</div><button class="btn" id="k-done">完成，更新今日待辦</button>';
    document.getElementById("k-res").innerHTML=html;
    document.getElementById("k-go").style.display="none";
    document.getElementById("k-done").onclick=()=>{mr.innerHTML="";renderDash();};
  };
}

/* 匯出今日摘要（貼給顧問/我做定期檢視） */
function exportModal(){
  const plots=load();const mr=document.getElementById("modal-root");const t=fmtD(today());
  let txt="【農務小幫手 今日摘要 "+t+"】\n信義鄉高冷地溫室\n";
  plots.forEach((r,i)=>{const c=CROPS[r.crop];const[st,,age]=stageOf(r);const phi=phiLock(r);const ht=harvestTotal(r);
    txt+="\n▌"+r.plot+" "+r.crop+"（第"+Math.max(age,0)+"天/"+st+"）\n";
    const todayRecs=(r.records||[]).filter(x=>x.date===t);
    if(todayRecs.length)todayRecs.forEach(x=>{const m=RTYPES[x.type];txt+="  · "+m.t+"："+(x.ec?"EC"+x.ec+"/pH"+(x.ph||"?"):x.qty?x.qty+"kg":x.note||"")+"\n";});
    const dyn=getDyn(i);if(dyn.length)dyn.forEach(d=>txt+="  ⚠ "+d+"\n");

    }});
  txt+="\n（請顧問就上述現況給施肥/灌溉/用藥與後續管理建議）";
  mr.innerHTML='<div class="modal-bg" id="mbg2"><div class="modal"><h3>匯出今日摘要</h3><p class="note">複製以下文字，貼給顧問或 AI 助手做定期檢視與建議。</p>'+

function renderActivityStrip(r){
  const recs=r.records||[];const tdy=today();
  const days=[];
  for(let i=6;i>=0;i--){const d=addD(tdy,-i);days.push({d,ds:fmtD(d),isToday:i===0});}
  const totalW=days.reduce((a,{ds})=>a+(recs.filter(x=>x.date===ds).length),0);
  const daysW=days.filter(({ds})=>recs.some(x=>x.date===ds)).length;
  const cells=days.map(({d,ds,isToday})=>{
    const dr=recs.filter(x=>x.date===ds);
    const has=dr.length>0;
    const types=[...new Set(dr.map(x=>x.type))].slice(0,4);
    const dots=types.map(t=>'<div class="act-dot" style="background:'+( TYPE_COL[t]||'var(--accent)')+'"></div>').join('');
    const cls='act-cell'+(isToday?' today':has?' has':'');
    const dName=['日','一','二','三','四','五','六'][d.getDay()];

      '<div class="act-dow">'+dName+'</div>'+
      '<div class="'+cls+'">'+
        '<div class="act-num">'+d.getDate()+'</div>'+
        (has&&!isToday?'<div class="act-dots">'+dots+'</div>':'')+
        (isToday?'<div style="font-size:.45rem;color:rgba(255,255,255,.8)">今天</div>':'')+
      '</div></div>';
  }).join('');
  const hint=daysW<4?'<div class="act-hint">💡 這週只有 '+daysW+' 天有記錄。每天至少記一筆「觀察」，有助掌握趨勢。</div>':'';

  return'<div class="act-strip">'+
    '<div class="act-hd">📅 近 7 天記錄<small>'+daysW+'/7 天有記錄 · 共 '+totalW+' 筆</small></div>'+
    '<div class="act-days">'+cells+'</div>'+
    '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px">'+legend+'</div>'+

  const g=harvestGrades(r);const totH=Math.round(harvestTotal(r)*10)/10;
  const totC=Math.round(costRecs.reduce((a,x)=>a+(+x.amount||0),0));
  const pr=PRICE_REF[r.crop]||{g1:50,g2:30,g3:10,note:"估計"};
  const hasGr=g.g2>0||g.g3>0;
  const rev=hasGr?Math.round(g.g1*pr.g1+g.g2*pr.g2+g.g3*pr.g3):Math.round(totH*pr.g1);
  const profit=rev-totC;
  const plants=r.plants||0;
  const perPlant=plants&&totH?Math.round(totH/plants*100)/100:null;
  let rows='';
  if(harvRecs.length){
    rows+='<div class="profit-row"><span>🌾 採收量</span><b>'+totH+' kg'+(hasGr?' （特'+g.g1+'/優'+g.g2+'/次'+g.g3+'kg）':'')+' </b></div>';
    if(hasGr)rows+='<div class="profit-row sm"><span>參考單價（'+pr.note+'）</span><b>特 NT$'+pr.g1+' / 優 NT$'+pr.g2+' / 次 NT$'+pr.g3+' /kg</b></div>';
    else rows+='<div class="profit-row sm"><span>參考單價（'+pr.note+'）</span><b>NT$'+pr.g1+'/kg</b></div>';
    rows+='<div class="profit-row"><span>💵 預估收入</span><b>NT$'+rev.toLocaleString()+'</b></div>';
  }
  if(costRecs.length)rows+='<div class="profit-row"><span>📤 成本合計</span><b>NT$'+totC.toLocaleString()+'</b></div>';
  if(perPlant)rows+='<div class="profit-row"><span>🌱 每株產量</span><b>'+perPlant+' kg</b></div>';
  const showP=harvRecs.length&&costRecs.length;
  const profitHtml=showP?
    '<div class="profit-total"><span class="pl">預估毛利</span><span class="pv '+(profit>=0?'pos':'neg')+'">'+(profit>=0?'+':'−')+'NT$'+Math.abs(profit).toLocaleString()+'</span></div>'+
    '<div class="profit-note">* 依 '+pr.note+' 估算，實際請依契作 / 市場成交價調整</div>':
    harvRecs.length?'<div class="profit-note">💡 補記「💰 成本」後可顯示毛利試算</div>':
    '<div class="profit-note">💡 補記「🧺 採收」後可顯示收入估算</div>';
  return'<div class="profit-card"><div class="profit-hd">📊 本季收益試算</div>'+rows+profitHtml+'</div>';
}

/* 智能健康警告 — 根據田區資料自動產生個人化行動提示 */
function renderHealthAlerts(r,c,age){
  if(age<3)return'';
  const recs=r.records||[];const tdy=today();
  const alerts=[];
  // 1. EC 量測狀況
  const ecRecs=recs.filter(x=>x.type==="ecph").sort((a,b)=>b.date>a.date?1:-1);
  const lastEc=ecRecs[0];
  if(age>=7){
    if(!lastEc){
      alerts.push({lv:'warn',icon:'🌡️',title:'還沒有 EC/pH 紀錄',msg:'第 '+age+' 天了，第一次量測很重要！EC 能告訴你肥料濃度是否正確，避免植株缺肥或積鹽傷根。',act:'ecph',abt:'去量測 →'});
    }else{
      const dse=Math.round((tdy-parseD(lastEc.date))/DAY);
      if(dse>=8){alerts.push({lv:'warn',icon:'🌡️',title:'EC/pH 已 '+dse+' 天未量測',msg:'上次：'+md(parseD(lastEc.date))+'（EC '+lastEc.ec+'）。建議每 3–5 天量一次，才能追蹤肥料狀況。',act:'ecph',abt:'去量測 →'});}
      const[,ecTgt]=ecStage(c,age);const ev=+lastEc.ec;
      if(ev>ecTgt*1.32){alerts.push({lv:'warn',icon:'⚠️',title:'EC 偏高（'+ev+' > 目標 '+ecTgt+'）',msg:'介質可能積鹽，植株容易根系脫水、葉緣焦褐。今日改澆清水（不加肥）沖洗，明天再量看看。',act:'ecph',abt:'量測確認 →'});}
      else if(ev<ecTgt*0.62&&age>=21){alerts.push({lv:'info',icon:'💧',title:'EC 偏低（'+ev+' < 目標 '+ecTgt+'）',msg:'肥料濃度可能不足，植株可能生長緩慢。可適量提高施肥濃度或縮短施肥間隔。',act:'fert',abt:'記錄施肥 →'});}
    }
  }
  // 2. 施肥起始提醒
  const fertRecs=recs.filter(x=>x.type==="fert");
  if(age>=21&&!fertRecs.length){
    alerts.push({lv:'info',icon:'💊',title:'第 '+age+' 天還沒有施肥紀錄',msg:'定植後 14–21 天應開始追肥。若已施肥請補記錄，才能追蹤養分投入。',act:'fert',abt:'記錄施肥 →'});
  }
  // 3. 黏板巡查
  const ipmRecs=recs.filter(x=>x.type==="ipm").sort((a,b)=>b.date>a.date?1:-1);
  const lastIpm=ipmRecs[0];
  if(age>=14){
    if(!lastIpm){
      alerts.push({lv:'info',icon:'🪤',title:'尚未做黏板巡查',msg:'每週查一次黏板蟲口，超過門檻才用藥（IPM 原則），可大幅減少農藥用量。',act:'ipm',abt:'記錄黏板 →'});
    }else{
      const dsi=Math.round((tdy-parseD(lastIpm.date))/DAY);
      if(dsi>=10){alerts.push({lv:'info',icon:'🪤',title:'黏板巡查已 '+dsi+' 天未做',msg:'上次：'+md(parseD(lastIpm.date))+'。建議每 7 天查一次黏板，預防病蟲害爆發。',act:'ipm',abt:'記錄黏板 →'});}
    }
  }
  // 4. 近期沒有任何紀錄
  if(recs.length){
    const sorted=recs.slice().sort((a,b)=>b.date>a.date?1:-1);
    const dsa=Math.round((tdy-parseD(sorted[0].date))/DAY);
    if(dsa>=5){alerts.push({lv:'info',icon:'📋',title:dsa+' 天沒有任何紀錄',msg:'定期記錄才能掌握趨勢。建議每天至少「觀察」一次，記錄今天看到的狀況。',act:'obs',abt:'記錄觀察 →'});}
  }
  // 5. 即將採收
  const dth=c.grow-age;
  if(dth>0&&dth<=14){alerts.push({lv:'harv',icon:'🧺',title:'距採收還剩 '+dth+' 天！',msg:'開始準備採收工具（剪刀、採收籃）、確認收購商聯絡方式。注意若有施藥須確認 PHI 安全期已過。',act:'harv',abt:'看採收指引 →'});}
  if(!alerts.length)return'';
  return'<div class="health-alerts">'+alerts.map(a=>
    '<div class="ha-card ha-'+a.lv+'"><div class="ha-top"><span class="ha-icon">'+a.icon+'</span><span class="ha-title">'+a.title+'</span></div>'+
    '<div class="ha-msg">'+a.msg+'</div>'+
    (a.act?'<button class="ha-btn" onclick="logModal(\''+a.act+'\')">'+a.abt+'</button>':'')+
    '</div>').join('')+'</div>';
}

/* 生長里程碑時間軸 */
function renderStageTimeline(r,c,age){
  if(age<0||!c.sched||!c.sched.length)return'';
  // 最多顯示6個里程碑（首、尾加中間均勻取）
  const s=c.sched;
  let ms=s;
  if(s.length>6){
    const pick=new Set([0,s.length-1]);
    const step=Math.max(1,Math.floor(s.length/4));
    for(let i=step;i<s.length-1;i+=step)pick.add(i);
    ms=s.filter((_,i)=>pick.has(i));
  }
  const total=c.grow;
  const pct=Math.min(100,Math.max(0,Math.round(age/total*100)));
  // 找目前最近的里程碑
  const passed=s.filter(([d])=>d<=age);
  const lastMs=passed.length?passed[passed.length-1]:null;
  const nextUp=s.find(([d])=>d>age)||null;
  const dots=ms.map(([d,task])=>{
    const done=d<age;
    const isCur=lastMs&&d===lastMs[0];
    const cls=isCur?'cur':done?'done':'future';
    const short=task.replace(/（.*?）/g,'').split(/[，、\/]/)[0].slice(0,5);
    return'<div class="tl-node"><div class="tl-dot '+cls+'"></div>'+
      '<div class="tl-lbl'+(isCur?' cur':'')+'" title="'+task+'">'+short+'</div>'+
      '<div class="tl-day">+'+d+'天</div></div>';
  }).join('');
  const nextHtml=nextUp?
    '<div class="tl-next">⏭ <b>約 '+(nextUp[0]-age)+' 天後</b>：'+nextUp[1]+'</div>':
    age>=c.grow?'<div class="tl-next" style="background:var(--harv-bg);color:var(--harv)">🎉 已進入採收期！按「🧺 採收」按鈕登錄每次收穫量。</div>':'';
  return'<div class="tl-wrap">'+
    '<div class="tl-hd">📍 生長里程碑 · <b>第 '+Math.max(0,age)+' 天</b>（栽培期共 '+total+' 天）</div>'+
    '<div class="tl-bar"><div class="tl-progress" style="width:'+pct+'%"></div></div>'+
    '<div class="tl-nodes">'+dots+'</div>'+
    (lastMs?'<div class="tl-cur">📌 最近完成：<b>'+lastMs[1]+'</b></div>':'')+
    nextHtml+'</div>';
}

/* ---------- 農事行事曆 ---------- */
let CAL_MONTH=(()=>{const d=new Date();d.setDate(1);return d;})();
const CAL_ICONS={fert:'💧',spray:'🧴',harv:'🍅',ecph:'🌡️',ipm:'🪤',obs:'👁️',work:'✂️',cost:'💰'};
function getMonthEvents(year,month){
  const plots=load();const events={};const harvRanges=[];
  const addEv=(ds,ev)=>{if(!events[ds])events[ds]=[];events[ds].push(ev);};
  plots.forEach(r=>{
    const c=CROPS[r.crop];if(!c||!r.date)return;
    const pD=parseD(r.date);
    // 已有記錄
    (r.records||[]).forEach(rec=>{
      const d=parseD(rec.date);
      if(d.getFullYear()===year&&d.getMonth()===month)
        addEv(fmtD(d),{plot:r.plot,desc:(RTYPES[rec.type]||{t:rec.type}).t,cls:TYPE_COL[rec.type]||'var(--accent)',icon:CAL_ICONS[rec.type]||'📝',src:'rec'});
    });
    // 採收期範圍
    const hS=addD(pD,c.grow),hE=addD(pD,c.grow+c.dur);
    harvRanges.push({s:hS,e:hE,plot:r.plot});
    if(hS.getFullYear()===year&&hS.getMonth()===month)
      addEv(fmtD(hS),{plot:r.plot,desc:'採收期開始',cls:'var(--harv)',icon:'🍅',src:'sch'});
    if(hE.getFullYear()===year&&hE.getMonth()===month)
      addEv(fmtD(hE),{plot:r.plot,desc:'採收期結束',cls:'var(--harv)',icon:'🏁',src:'sch'});
    // PHI 解除日
    const lastSpray=(r.records||[]).filter(x=>x.type==='spray'&&+x.phi>0).sort((a,b)=>b.date>a.date?1:-1)[0];
    if(lastSpray){const phiD=addD(parseD(lastSpray.date),+lastSpray.phi);
      if(phiD.getFullYear()===year&&phiD.getMonth()===month)
        addEv(fmtD(phiD),{plot:r.plot,desc:'採收安全期解除（'+lastSpray.note+'）',cls:'var(--warn)',icon:'✅',src:'phi'});}
    // 生育里程碑
    (c.sched||[]).forEach(([days,task])=>{
      const d=addD(pD,days);
      if(d.getFullYear()===year&&d.getMonth()===month)
        addEv(fmtD(d),{plot:r.plot,desc:task.replace(/（.*?）/g,'').slice(0,16),cls:'var(--grow)',icon:'📌',src:'sch'});
    });
  });
  return{events,harvRanges};
}
function renderCal(){
  const v=document.getElementById("view-cal");
  const year=CAL_MONTH.getFullYear(),month=CAL_MONTH.getMonth();
  const{events,harvRanges}=getMonthEvents(year,month);
  const tS=fmtD(today());
  const DOW=['日','一','二','三','四','五','六'];
  const dows=DOW.map((d,i)=>'<div class="cal-dow" style="'+(i===0?'color:var(--warn)':i===6?'color:var(--blue)':'')+'">'+d+'</div>').join('');
  // 建立格子
  const fD=new Date(year,month,1),lD=new Date(year,month+1,0);
  let cells=[];
  for(let i=0;i<fD.getDay();i++)cells.push({d:addD(fD,-(fD.getDay()-i)),in:false});
  for(let i=1;i<=lD.getDate();i++)cells.push({d:new Date(year,month,i),in:true});
  while(cells.length%7)cells.push({d:addD(cells[cells.length-1].d,1),in:false});
  const cellsHtml=cells.map(({d,in:inM})=>{
    const ds=fmtD(d);const isT=ds===tS;
    const evs=events[ds]||[];
    const cols=[...new Set(evs.map(e=>e.cls))].slice(0,4);
    const dots=cols.map(c=>'<span class="cal-dot" style="background:'+c+'"></span>').join('');
    const dow=d.getDay();
    const dc=inM?(dow===0?'color:var(--warn)':dow===6?'color:var(--blue)':''):'';
    const inH=inM&&harvRanges.some(({s,e})=>d>=s&&d<=e);
    return'<div class="cal-cell'+(inM?'':' cal-other')+(inH?' cal-harv':'')+(isT?' cal-today':'')+'">'+
      '<div class="cal-d" style="'+dc+'">'+d.getDate()+'</div>'+
      (dots?'<div class="cal-dots">'+dots+'</div>':'')+
      '</div>';
  }).join('');
  // 事件列表
  const allDs=Object.keys(events).filter(ds=>{const d=parseD(ds);return d.getFullYear()===year&&d.getMonth()===month;}).sort();
  let evHtml=allDs.map(ds=>{
    const evs=events[ds];
    const d=parseD(ds);
    const lbl=(month+1)+'/'+d.getDate()+'（'+DOW[d.getDay()]+'）';
    const items=evs.map(e=>'<div class="cal-ev-item" style="border-left-color:'+e.cls+'">'+
      '<span class="cal-ev-icon">'+e.icon+'</span>'+
      '<div class="cal-ev-body"><div class="cal-ev-plot">'+e.plot+'</div>'+
      '<div class="cal-ev-desc">'+e.desc+'</div></div></div>').join('');
    return'<div class="cal-ev-group"><div class="cal-ev-date">'+lbl+'</div>'+items+'</div>';
  }).join('');
  const leg=[['var(--grow)','里程碑'],['var(--harv)','採收期'],['var(--warn)','PHI/警示'],['var(--accent)','施肥'],['🧴','用藥'],['var(--blue)','EC/pH']];
  const legHtml=leg.map(([c,n])=>'<div class="cal-leg">'+(c.startsWith('var')||c.startsWith('#')?'<span class="cal-dot" style="background:'+c+'"></span>':'<span style="font-size:.72rem">'+c+'</span>')+n+'</div>').join('');
  const mn=year+'年'+(month+1)+'月';
  v.innerHTML='<h2>農事行事曆</h2><p class="note">各田區採收期、施肥里程碑、PHI 解除日一覽。</p>'+
    '<div class="cal-wrap">'+
    '<div class="cal-nav"><button id="cal-prev">‹ 上月</button><span class="cal-title">'+mn+'</span><button id="cal-next">下月 ›</button></div>'+
    '<div class="cal-grid">'+dows+cellsHtml+'</div>'+
    '<div class="cal-legend">'+legHtml+'</div></div>'+
    '<div class="cal-events-hd">本月農事事項</div>'+
    (evHtml||'<div class="empty" style="font-size:.8rem">本月暫無排程事項。</div>');
  v.querySelector("#cal-prev").onclick=()=>{CAL_MONTH=new Date(year,month-1,1);renderCal();};
  v.querySelector("#cal-next").onclick=()=>{CAL_MONTH=new Date(year,month+1,1);renderCal();};
}

/* ---------- 田區健康評分 ---------- */
function plotHealthScore(r){
  const c=CROPS[r.crop];if(!c)return{score:0,label:'未知',cls:'hs-bad'};
  const[,,age]=stageOf(r);if(age<0)return{score:100,label:'待定植',cls:'hs-ok'};
  const recs=r.records||[];const tdy=today();
  const diff=d=>Math.floor((tdy-parseD(d))/864e5);
  const srt=arr=>arr.slice().sort((a,b)=>b.date>a.date?1:-1);
  let score=100;
  // EC 量測（最多扣 30 分）
  if(age>7){const lastEc=srt(recs.filter(x=>x.type==='ecph'))[0];
    const ecD=lastEc?diff(lastEc.date):99;
    score-=!lastEc?30:ecD>10?30:ecD>7?18:ecD>4?8:0;}
  // 任何記錄（最多扣 25 分）
  if(age>3){const lastAny=srt(recs)[0];
    const anyD=lastAny?diff(lastAny.date):99;
    score-=!lastAny?25:anyD>7?25:anyD>5?14:anyD>3?6:0;}
  // IPM 黏板巡查（最多扣 20 分）
  if(age>14){const lastIpm=srt(recs.filter(x=>x.type==='ipm'))[0];
    const ipmD=lastIpm?diff(lastIpm.date):99;
    score-=!lastIpm?20:ipmD>14?20:ipmD>10?12:ipmD>7?5:0;}
  // 施肥記錄（最多扣 15 分）
  if(age>14){const lastFert=srt(recs.filter(x=>x.type==='fert'))[0];
    const fertD=lastFert?diff(lastFert.date):99;
    score-=!lastFert?15:fertD>14?15:fertD>10?8:0;}
  score=Math.max(0,Math.min(100,score));
  const label=score>=85?'優良':score>=65?'良好':score>=45?'需注意':'待改善';
  const cls=score>=85?'hs-ok':score>=65?'hs-good':score>=45?'hs-warn':'hs-bad';
  return{score,label,cls};
}
/* ---------- 今日行動摘要 ---------- */
function renderTodayActions(plots){
  if(!plots.length)return'';
  const tdy=today();const items=[];
  plots.forEach((r,i)=>{
    const c=CROPS[r.crop];if(!c)return;
    const[,,age]=stageOf(r);if(age<0)return;
    const recs=r.records||[];
    const srt=arr=>arr.slice().sort((a,b)=>b.date>a.date?1:-1);
    const lastEc=srt(recs.filter(x=>x.type==='ecph'))[0];
    const lastAny=srt(recs)[0];
    const lastIpm=srt(recs.filter(x=>x.type==='ipm'))[0];
    const diff=d=>Math.floor((tdy-parseD(d))/864e5);
    const ecDays=lastEc?diff(lastEc.date):age;
    const anyDays=lastAny?diff(lastAny.date):age;
    const ipmDays=lastIpm?diff(lastIpm.date):age;
    if(age>=c.grow&&age<=c.grow+c.dur)items.push({i,lv:'harv',icon:'🍅',plot:r.plot,crop:r.crop,msg:'採收期中，今天可採收'});
    if(age>7&&ecDays>=7)items.push({i,lv:'warn',icon:'⚠️',plot:r.plot,crop:r.crop,msg:'EC/pH 已'+ecDays+'天未測'});
    if(age>5&&anyDays>=5)items.push({i,lv:'warn',icon:'📭',plot:r.plot,crop:r.crop,msg:anyDays+'天無任何記錄'});
    if(age>14&&ipmDays>=10)items.push({i,lv:'warn',icon:'🪤',plot:r.plot,crop:r.crop,msg:'黏板巡查已'+ipmDays+'天未做'});
    const o=tasksFor(r);
    if((o.today||[]).length&&!items.some(x=>x.i===i&&(x.lv==='warn'||x.lv==='harv')))
      items.push({i,lv:'today',icon:'📋',plot:r.plot,crop:r.crop,msg:'今日任務 '+(o.today||[]).length+' 項'});
  });
  const urgCnt=items.filter(x=>x.lv==='warn'||x.lv==='harv').length;
  if(!items.length)return'<div class="ta-card ta-ok"><div class="ta-hd">✅ 今日各田區狀態良好<span class="ta-badge" style="background:var(--grow)">無待辦</span></div><div style="font-size:.75rem;color:var(--ink-soft)">繼續保持每天記錄的好習慣！</div></div>';
  const rows=items.map(it=>{
    const bg=it.lv==='warn'?'var(--warn-bg)':it.lv==='harv'?'var(--harv-bg)':'var(--grow-bg)';
    const bd=it.lv==='warn'?'var(--warn)':it.lv==='harv'?'var(--harv)':'var(--grow)';
    const fc=it.lv==='warn'?'var(--warn)':it.lv==='harv'?'var(--harv)':'var(--grow)';
    return'<div class="ta-row" data-i="'+it.i+'" style="background:'+bg+';border-color:'+bd+'">'+
      '<span class="ta-icon">'+it.icon+'</span>'+
      '<span class="ta-info">'+it.plot+'<span class="ta-crop">'+it.crop+'</span></span>'+
      '<span class="ta-msg" style="color:'+fc+'">'+it.msg+'</span>'+
      '<span class="ta-arr">›</span></div>';
  }).join('');
  const badge=urgCnt?'<span class="ta-badge">'+urgCnt+' 項需注意</span>':'<span class="ta-badge" style="background:var(--grow)">今日有任務</span>';
  return'<div class="ta-card"><div class="ta-hd">🎯 今日行動摘要'+badge+'</div>'+rows+'</div>';
}

// 壓縮圖片為 dataURL（長邊 max 1024、JPEG 0.7），控制上傳大小
function compressImage(file,max,q){return new Promise((res,rej)=>{
  const img=new Image();const url=URL.createObjectURL(file);
  img.onload=()=>{URL.revokeObjectURL(url);let w=img.width,h=img.height;
    if(Math.max(w,h)>max){if(w>=h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;}}
    const c=document.createElement("canvas");c.width=w;c.height=h;
    c.getContext("2d").drawImage(img,0,0,w,h);res(c.toDataURL("image/jpeg",q));};
  img.onerror=()=>{URL.revokeObjectURL(url);rej(new Error("讀取圖片失敗"));};img.src=url;});}

      '<div style="font-size:.74rem;color:var(--ink-soft);margin-top:6px;line-height:1.6">'+

    if(diff>0){

    if(!ds||!n)return;const plant=parseD(ds);const first=addD(plant,c.grow);const last=addD(first,c.dur);const ratio=n/c.density;

    const light=s=>s>=1.15?["hi","高價"]:s<=.9?["lo","低價"]:["mid","普通"];

  // 把市場比價結果渲染出來（含常送市場過濾、加星、收入試算）
  function renderMarket(d,range){
    const res=v.querySelector("#mk-res");
    const appCrop=v.querySelector("#mk-crop").value;
    const favOnly=v.querySelector("#mk-fav").checked;
    const fav=loadFav();

    ms.sort((a,b)=>b.avg-a.avg);
    // 依「目前顯示的市場」重算最佳，路由才符合實際會送的市場
    const bU=ms.reduce((a,b)=>b.upper>a.upper?b:a).market;
    const bL=ms.reduce((a,b)=>b.lower>a.lower?b:a).market;
    const bM=ms.reduce((a,b)=>b.middle>a.middle?b:a).market;
    const mU=ms.find(m=>m.market===bU),mM=ms.find(m=>m.market===bM),mL=ms.find(m=>m.market===bL);
    let rows=ms.map(m=>{
      const upHi=m.market===bU,loHi=m.market===bL;const isFav=fav.includes(m.market);
      return '<div class="rec"><span class="rt"><b>'+m.market+'</b> '+
        '<button class="del" data-fav="'+m.market.replace(/"/g,'')+'" style="padding:0 4px;font-size:1rem;color:'+(isFav?'var(--grow)':'var(--line)')+'">★</button>'+

        '中 '+m.middle+'　'+
        '<span'+(loHi?' style="color:var(--harv);font-weight:700"':'')+'>下 '+m.lower+(loHi?' ⭐':'')+'</span>　'+

    }).join("");
    // 收入試算：預填該作物累計特/優/次（可改）
    let g={g1:0,g2:0,g3:0};load().forEach(r=>{if(r.crop===appCrop){const gg=harvestGrades(r);g.g1+=gg.g1;g.g2+=gg.g2;g.g3+=gg.g3;}});
    const calc='<div class="res" style="margin-top:10px"><h4>🧮 這批貨收入試算（依上表最佳市場）</h4>'+
      '<div class="row2"><div><label class="f">上貨/特級 kg → '+bU+'</label><input class="t" id="mk-q1" type="number" value="'+Math.round(g.g1*10)/10+'"></div>'+
      '<div><label class="f">中貨/優級 kg → '+bM+'</label><input class="t" id="mk-q2" type="number" value="'+Math.round(g.g2*10)/10+'"></div></div>'+
      '<label class="f">下貨/次級 kg → '+bL+'</label><input class="t" id="mk-q3" type="number" value="'+Math.round(g.g3*10)/10+'">'+
      '<div class="info" id="mk-rev" style="margin-top:10px"></div></div>';
    res.innerHTML='<div class="res" style="margin-top:12px"><h4>📊 '+d.crop+'　各市場行情（元/kg）</h4>'+
      '<div class="info" style="margin:0 0 10px">🔼 <b>上貨</b>送 <b>'+bU+'</b>（上 '+mU.upper+'）　🔽 <b>下貨</b>送 <b>'+bL+'</b>（下 '+mL.lower+'）</div>'+
      rows+'<div class="foot" style="text-align:left">'+range+' 交易量加權平均。⭐ 該價位最高市場。點 ★ 設常送市場。資料來源：農業部 AMIS。</div></div>'+calc;
    const rev=()=>{const q1=+v.querySelector("#mk-q1").value||0,q2=+v.querySelector("#mk-q2").value||0,q3=+v.querySelector("#mk-q3").value||0;
      const r1=q1*mU.upper,r2=q2*mM.middle,r3=q3*mL.lower;const tot=r1+r2+r3;
      v.querySelector("#mk-rev").innerHTML='上貨 '+q1+'kg×'+mU.upper+' = <b>'+Math.round(r1).toLocaleString()+'</b> 元（'+bU+'）<br>'+
        '中貨 '+q2+'kg×'+mM.middle+' = <b>'+Math.round(r2).toLocaleString()+'</b> 元（'+bM+'）<br>'+
        '下貨 '+q3+'kg×'+mL.lower+' = <b>'+Math.round(r3).toLocaleString()+'</b> 元（'+bL+'）<br>'+
        '<span style="font-size:1.05rem">合計約 <b style="color:var(--accent)">'+Math.round(tot).toLocaleString()+'</b> 元</span>';};
    ["mk-q1","mk-q2","mk-q3"].forEach(id=>v.querySelector("#"+id).oninput=rev);rev();
    v.querySelectorAll("[data-fav]").forEach(b=>b.onclick=()=>{let f=loadFav();const nm=b.dataset.fav;
      if(f.includes(nm))f=f.filter(x=>x!==nm);else f.push(nm);saveFav(f);renderMarket(d,range);});
